<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background:#0f1220;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:30px;
}
button,input {
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
}
button {
  background:#ff4757;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎲 Pokémon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Username">
  <button id="startBtn" type="button">Start</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>
  <button id="rollBtn" type="button">🎲 Roll</button>
  <p id="result">Roll to begin</p>
</div>

<script>
/* ---------- SUPABASE (FIXED) ---------- */
const SUPABASE_URL = "https://mlkhgrkayqwqlvzagvjq.supabase.co";
const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2hncmtheXF3cWx2emFndmpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNDE3MDEsImV4cCI6MjA4MzkxNzcwMX0.YzCjC52nhY829bxDeAoipdXq-6Heu7sPtbKmg1mpV1s";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---------- DOM ---------- */
const startBtn = document.getElementById("startBtn");
const usernameInput = document.getElementById("usernameInput");
const login = document.getElementById("login");
const game = document.getElementById("game");
const playerInfo = document.getElementById("playerInfo");
const rollBtn = document.getElementById("rollBtn");
const result = document.getElementById("result");

/* ---------- LOGIN ---------- */
startBtn.addEventListener("click", async () => {
  console.log("START CLICKED"); // 🔥 YOU WILL SEE THIS

  const username = usernameInput.value.trim();
  if (!username) {
    alert("Enter a username");
    return;
  }

  let { data } = await db
    .from("players")
    .select("*")
    .eq("username", username)
    .maybeSingle();

  if (!data) {
    const res = await db
      .from("players")
      .insert({ username })
      .select()
      .single();
    data = res.data;
  }

  login.style.display = "none";
  game.style.display = "block";
  playerInfo.textContent = "Player: " + data.username;
});

/* ---------- ROLL ---------- */
rollBtn.addEventListener("click", () => {
  console.log("ROLL CLICKED");
  const mons = ["Pidgey","Abra","Riolu","Dragonite","Mew"];
  result.textContent = mons[Math.floor(Math.random()*mons.length)];
});
</script>

</body>
</html>
