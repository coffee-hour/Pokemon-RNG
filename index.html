<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* (your existing styles stay exactly as before) */
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: 'Trebuchet MS', Arial, sans-serif;
  text-align: center;
  padding: 30px;
  overflow-x: hidden;
}
h1 { letter-spacing: 2px; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
input, button {
  padding: 12px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}
button {
  background: linear-gradient(145deg, #ff4757, #ff6b81);
  color: white;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(255,71,87,0.4);
  transition: transform 0.2s;
}
button:hover { transform: scale(1.05); }
#game { margin-top: 25px; }
.card {
  margin: 25px auto;
  width: 260px; height: 180px;
  border-radius: 18px;
  background: linear-gradient(145deg, #22265c, #14183a);
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  font-size: 22px;
  animation: flipIn 0.6s ease;
}
.card small { font-size: 14px; opacity: 0.8; }
.card.common { color:#aaa; }
.card.uncommon { color:#2ecc71; }
.card.rare { color:#3498db; }
.card.ultra { color:#9b59b6; box-shadow:0 0 35px #9b59b6; }
.card.mythical { color:gold; box-shadow:0 0 50px gold; animation:pulse 1s infinite; }
@keyframes flipIn { from {transform:rotateY(90deg) scale(0.8); opacity:0;} to {transform:rotateY(0deg) scale(1); opacity:1;} }
@keyframes pulse { 0% {box-shadow: 0 0 25px gold;} 50% {box-shadow: 0 0 55px gold;} 100% {box-shadow: 0 0 25px gold;} }
.shake { animation:shake 0.4s; }
@keyframes shake { 0%{transform:translateX(0);}25%{transform:translateX(-6px);}50%{transform:translateX(6px);}75%{transform:translateX(-4px);}100%{transform:translateX(0);} }
.stats { font-size:14px; opacity:0.9; }
</style>
</head>

<body>

<h1>🎲 Pokémon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Enter username">
  <br>
  <button id="startBtn">Start Game</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>

  <button id="rollBtn">🎲 Roll Pokémon</button>

  <div id="result" class="card common">Roll to begin!</div>

  <div class="stats">
    <p>Total Rolls: <span id="rolls">0</span></p>
    <p>Best Pull: <span id="best">None</span></p>
  </div>
</div>

<script>
// ---------- SUPABASE ----------
const SUPABASE_URL = "https://yunxxrofozxqmtwomegk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bnh4cm9mb3p4cW10d29tZWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNDEwOTYsImV4cCI6MjA4MzkxNzA5Nn0.sHSzVg4Nj9j7-dkdtsDj7Smg_cArweYBKGHfSioEZUY"; // ← PUT YOUR KEY HERE
const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---------- GAME DATA ----------
const rarityTable = [
  { name:"Common", class:"common", chance:70, pool:["Pidgey","Rattata","Caterpie"] },
  { name:"Uncommon", class:"uncommon", chance:20, pool:["Machop","Abra","Growlithe"] },
  { name:"Rare", class:"rare", chance:8, pool:["Riolu","Gible","Larvitar"] },
  { name:"Ultra", class:"ultra", chance:1.8, pool:["Dragonite","Metagross"] },
  { name:"Mythical", class:"mythical", chance:0.2, pool:["Mew","Celebi"] }
];

let player = null;

// ---------- LOGIN ----------
startBtn.onclick = async () => {
  const username = usernameInput.value.trim();
  if (!username) { alert("Enter a username"); return; }

  // fetch or create
  const { data: existing, error: fetchErr } = await supabase
    .from("players")
    .select("*")
    .eq("username", username)
    .single();

  if(fetchErr && fetchErr.code !== "PGRST116") {
    alert("Error loading user: "+fetchErr.message);
    return;
  }

  if (!existing) {
    const { data: newPlayer, error: createErr } = await supabase
      .from("players")
      .insert({ username })
      .select()
      .single();
    if(createErr) { alert("Failed to create: "+createErr.message); return; }
    player = newPlayer;
  } else {
    player = existing;
  }

  login.style.display = "none";
  game.style.display = "block";
  playerInfo.textContent = `Trainer: ${player.username}`;
  updateUI();
};

// ---------- ROLL ----------
rollBtn.onclick = async () => {
  const rarity = rollRarity();
  const pokemon = rarity.pool[Math.floor(Math.random()*rarity.pool.length)];

  player.total_rolls++;

  const rank = rarityTable.indexOf(rarity) + 1;
  if (rank > player.best_rank) {
    player.best_rank = rank;
    player.best_pull = `${pokemon} (${rarity.name})`;
  }

  result.className = `card ${rarity.class}`;
  result.innerHTML = `<div>${pokemon}</div><small>${rarity.name}</small>`;
  if(rank>=4){ document.body.classList.add("shake"); setTimeout(()=>document.body.classList.remove("shake"),400); }

  updateUI();

  const { error } = await supabase.from("players")
    .update({
      total_rolls: player.total_rolls,
      best_rank: player.best_rank,
      best_pull: player.best_pull
    })
    .eq("username", player.username);

  if(error) console.error("Save failed:", error);
};

// ---------- HELPERS ----------
function rollRarity(){
  let r=Math.random()*100, c=0;
  for(const x of rarityTable){ c+=x.chance; if(r<=c) return x; }
  return rarityTable[0];
}
function updateUI(){
  rolls.textContent = player.total_rolls;
  best.textContent = player.best_pull ?? "None";
}
</script>

</body>
</html>
