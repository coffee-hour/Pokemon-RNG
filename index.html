<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { background:#0f1220; color:#fff; font-family:Arial,sans-serif; text-align:center; margin:0; padding:20px; }
h1{margin-bottom:10px;}
button{background:#ff4757;border:none;color:white;padding:15px 30px;font-size:18px;border-radius:10px;cursor:pointer;}
button:hover{background:#ff6b81;}
.card{margin:20px auto;padding:20px;max-width:320px;border-radius:15px;background:#1c1f3a;box-shadow:0 0 20px rgba(0,0,0,0.4);}
.card.shiny{box-shadow:0 0 30px gold;}
.rarity-common{color:#aaa;}
.rarity-uncommon{color:#2ecc71;}
.rarity-rare{color:#3498db;}
.rarity-ultra{color:#9b59b6;}
.rarity-mythical{color:#f1c40f;}
.stats{margin-top:20px;font-size:14px;}
.history{margin-top:20px;font-size:13px;opacity:0.8;}
form{margin:10px auto;max-width:300px;}
input{margin:5px 0;padding:8px;width:100%;border-radius:5px;border:none;}
</style>
</head>
<body>

<h1>🎲 Pokémon RNG Challenge</h1>

<div id="authForms">
    <h3>Sign Up</h3>
    <form id="signupForm">
        <input type="text" placeholder="Username" id="signupUsername" required />
        <input type="password" placeholder="Password" id="signupPassword" required />
        <button type="submit">Sign Up</button>
    </form>

    <h3>Login</h3>
    <form id="loginForm">
        <input type="text" placeholder="Username" id="loginUsername" required />
        <input type="password" placeholder="Password" id="loginPassword" required />
        <button type="submit">Login</button>
    </form>
</div>

<div id="game" style="display:none;">
    <p id="playerInfo"></p>
    <button onclick="rollPokemon()">🎲 Roll Pokémon</button>

    <div id="result" class="card"><p>Press Roll to begin!</p></div>

    <div class="stats">
        <p>Total Rolls: <span id="totalRolls">0</span></p>
        <p>Shinies Found: <span id="shinyCount">0</span></p>
        <p>Best Pull: <span id="bestPull">None</span></p>
    </div>

    <div class="history">
        <p>Last Rolls:</p>
        <div id="history"></div>
    </div>
</div>

<script>
// ---------- SUPABASE SETUP ----------
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let user = null;
let playerData = null;

// ---------- DATA ----------
const rarityTable = [
    { name: "Common", chance: 70, rank: 1, class: "rarity-common", pool: ["Pidgey","Rattata","Caterpie"] },
    { name: "Uncommon", chance: 20, rank: 2, class: "rarity-uncommon", pool: ["Growlithe","Machop","Abra"] },
    { name: "Rare", chance: 8, rank: 3, class: "rarity-rare", pool: ["Gible","Riolu","Larvitar"] },
    { name: "Ultra Rare", chance: 1.8, rank: 4, class: "rarity-ultra", pool: ["Dragonite","Metagross"] },
    { name: "Mythical", chance: 0.2, rank: 5, class: "rarity-mythical", pool: ["Mew","Celebi"] }
];
const SHINY_RATE = 4096;

// ---------- AUTH FUNCTIONS ----------
async function signUp(e){
    e.preventDefault();
    const username = document.getElementById('signupUsername').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    if(!username || !password){ alert("Fill all fields"); return; }

    // Check if username exists
    let { data: existing } = await supabase.from('users').select('*').eq('username', username).single();
    if(existing){ alert("Username already exists!"); return; }

    // Create user
    const { data, error } = await supabase.from('users').insert({ username, password }).select().single();
    if(error){ alert(error.message); return; }

    user = data;

    // Create player row
    const { error: playerError } = await supabase.from('players').insert({ id: user.id }).select().single();
    if(playerError){ alert(playerError.message); return; }

    alert("Signup successful! You can now login.");
    document.getElementById('signupForm').reset();
}

async function login(e){
    e.preventDefault();
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if(!username || !password){ alert("Fill all fields"); return; }

    const { data: u, error } = await supabase.from('users').select('*').eq('username', username).eq('password', password).single();
    if(error || !u){ alert("Invalid username or password"); return; }

    user = u;

    // Load player data
    const { data: p, error: playerError } = await supabase.from('players').select('*').eq('id', user.id).single();
    if(playerError){ alert(playerError.message); return; }

    playerData = p;
    document.getElementById('authForms').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('playerInfo').textContent = `Logged in as ${user.username}`;
    updateStats();
}

// ---------- RNG GAME ----------
function rollRarity(){
    let roll=Math.random()*100, cum=0;
    for(let r of rarityTable){ cum+=r.chance; if(roll<=cum) return r; }
    return rarityTable[0];
}

async function rollPokemon(){
    const rarity = rollRarity();
    const pokemon = rarity.pool[Math.floor(Math.random()*rarity.pool.length)];
    const isShiny = Math.floor(Math.random()*SHINY_RATE)===0;

    playerData.total_rolls++;
    if(isShiny) playerData.shiny_count++;
    if(rarity.rank > playerData.best_pull_rank){
        playerData.best_pull = `${pokemon} (${rarity.name})`;
        playerData.best_pull_rank = rarity.rank;
    }

    if(!playerData.history) playerData.history = [];
    playerData.history.unshift(`${isShiny ? "✨ " : ""}${pokemon} (${rarity.name})`);
    playerData.history = playerData.history.slice(0,5);

    displayResult(pokemon, rarity, isShiny);
    updateStats();

    // Save stats to Supabase
    await supabase.from('players').update({
        total_rolls: playerData.total_rolls,
        shiny_count: playerData.shiny_count,
        best_pull: playerData.best_pull,
        best_pull_rank: playerData.best_pull_rank,
        history: playerData.history
    }).eq('id', playerData.id);
}

// ---------- DISPLAY ----------
function displayResult(name, rarity, shiny){
    const card = document.getElementById('result');
    card.className = `card ${shiny?'shiny':''}`;
    card.innerHTML = `<h2>${shiny?'✨ Shiny ':''}${name}</h2><p class="${rarity.class}">${rarity.name}</p>`;
}

function updateStats(){
    document.getElementById('totalRolls').textContent = playerData.total_rolls;
    document.getElementById('shinyCount').textContent = playerData.shiny_count;
    document.getElementById('bestPull').textContent = playerData.best_pull ?? 'None';
    document.getElementById('history').innerHTML = (playerData.history||[]).map(r=>`<div>${r}</div>`).join('');
}

// ---------- EVENTS ----------
document.getElementById('signupForm').addEventListener('submit', signUp);
document.getElementById('loginForm').addEventListener('submit', login);
</script>
</body>
</html>
