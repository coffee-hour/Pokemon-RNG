<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { background:#0f1220;color:#fff;font-family:Arial;text-align:center;padding:20px }
button{background:#ff4757;border:none;color:white;padding:12px 25px;font-size:16px;border-radius:8px;cursor:pointer}
button:hover{background:#ff6b81}
.card{margin:20px auto;padding:20px;max-width:320px;border-radius:12px;background:#1c1f3a}
.shiny{box-shadow:0 0 25px gold}
input{padding:10px;width:100%;margin:10px 0;border-radius:5px;border:none}
table{margin:20px auto;border-collapse:collapse;width:90%;max-width:400px}
td,th{border-bottom:1px solid #333;padding:8px}
</style>
</head>
<body>

<h1>🎲 Pokémon RNG Challenge</h1>

<div id="login">
  <input id="usernameInput" placeholder="Enter username" />
  <button onclick="startGame()">Start</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>
  <button onclick="rollPokemon()">🎲 Roll</button>
  <div id="result" class="card">Roll to begin</div>

  <p>Total Rolls: <span id="totalRolls">0</span></p>
  <p>Best Pull: <span id="bestPull">None</span></p>

  <h3>🏆 Global Leaderboard</h3>
  <table>
    <thead><tr><th>User</th><th>Best</th></tr></thead>
    <tbody id="leaderboard"></tbody>
  </table>
</div>

<script>
// ---------- SUPABASE ----------
const supabase = Supabase.createClient(
  'https://yunxxrofozxqmtwomegk.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bnh4cm9mb3p4cW10d29tZWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNDEwOTYsImV4cCI6MjA4MzkxNzA5Nn0.sHSzVg4Nj9j7-dkdtsDj7Smg_cArweYBKGHfSioEZUY'
);

// ---------- GAME DATA ----------
const rarityTable = [
  { name:"Common", chance:70, rank:1, pool:["Pidgey","Rattata"] },
  { name:"Uncommon", chance:20, rank:2, pool:["Machop","Abra"] },
  { name:"Rare", chance:8, rank:3, pool:["Riolu","Gible"] },
  { name:"Ultra", chance:1.8, rank:4, pool:["Dragonite"] },
  { name:"Mythical", chance:0.2, rank:5, pool:["Mew"] }
];

let player = null;

// ---------- START ----------
async function startGame(){
  const username = usernameInput.value.trim();
  if(!username) return alert("Enter a username");

  localStorage.setItem("rng_user", username);

  let { data } = await supabase.from('players').select('*').eq('username', username).single();

  if(!data){
    const res = await supabase.from('players').insert({ username }).select().single();
    player = res.data;
  } else {
    player = data;
  }

  login.style.display = "none";
  game.style.display = "block";
  playerInfo.textContent = `Player: ${player.username}`;
  updateStats();
  loadLeaderboard();
}

// ---------- RNG ----------
function rollRarity(){
  let r=Math.random()*100,c=0;
  for(let x of rarityTable){ c+=x.chance; if(r<=c) return x; }
  return rarityTable[0];
}

async function rollPokemon(){
  const rarity = rollRarity();
  const pokemon = rarity.pool[Math.floor(Math.random()*rarity.pool.length)];

  player.total_rolls++;

  if(rarity.rank > player.best_pull_rank){
    player.best_pull_rank = rarity.rank;
    player.best_pull = `${pokemon} (${rarity.name})`;

    // UPDATE LEADERBOARD
    await supabase.from('leaderboard')
      .upsert({ username: player.username, best_pull_rank: rarity.rank, best_pull: player.best_pull });
  }

  await supabase.from('players').update({
    total_rolls: player.total_rolls,
    best_pull_rank: player.best_pull_rank,
    best_pull: player.best_pull
  }).eq('id', player.id);

  result.innerHTML = `<h2>${pokemon}</h2><p>${rarity.name}</p>`;
  updateStats();
  loadLeaderboard();
}

// ---------- UI ----------
function updateStats(){
  totalRolls.textContent = player.total_rolls;
  bestPull.textContent = player.best_pull ?? "None";
}

// ---------- LEADERBOARD ----------
async function loadLeaderboard(){
  const { data } = await supabase
    .from('leaderboard')
    .select('*')
    .order('best_pull_rank', { ascending:false })
    .limit(10);

  leaderboard.innerHTML = data.map(
    r => `<tr><td>${r.username}</td><td>${r.best_pull}</td></tr>`
  ).join('');
}

// ---------- AUTO LOGIN ----------
const saved = localStorage.getItem("rng_user");
if(saved){ usernameInput.value=saved; startGame(); }
</script>
</body>
</html>
