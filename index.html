<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#1b1f4b,#0a0c1a);
  color:white;
  display:flex;
}

/* Sidebar */
#sidebar{
  width:260px;
  margin-right:20px;
  display:flex;
  flex-direction:column;
}

#dexSearch{
  padding:8px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

#dex{
  background:#0f1233;
  border-radius:10px;
  padding:10px;
  overflow-y:auto;
  max-height:80vh;
}

.dex-entry{
  font-size:14px;
  padding:5px 8px;
  border-radius:6px;
  margin:3px 0;
  opacity:.35;
}

.dex-entry.collected{opacity:1}

/* Rarity colors */
.common{background:#b0bec5;color:black}
.uncommon{background:#66bb6a;color:black}
.rare{background:#42a5f5}
.ultra{background:#ab47bc}
.mythical{background:linear-gradient(45deg,gold,orange);color:black}

/* Main */
#main{flex:1;text-align:center}

button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#ff4757;
  color:white;
  cursor:pointer;
}

.card{
  margin:20px auto;
  width:260px;
  height:170px;
  border-radius:16px;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:20px;
  animation:pop .4s ease;
}

@keyframes pop{
  0%{transform:scale(.8);opacity:0}
  60%{transform:scale(1.1)}
  100%{transform:scale(1);opacity:1}
}

.card.common{color:#bbb}
.card.uncommon{color:#2ecc71}
.card.rare{color:#3498db}
.card.ultra{color:#9b59b6}
.card.mythical{color:gold}
</style>
</head>

<body>

<div id="sidebar">
  <input id="dexSearch" placeholder="Search Pokédex">
  <div id="dex"></div>
</div>

<div id="main">
<h1>🎲 Pokémon RNG</h1>

<div id="login">
  <input id="username" placeholder="Trainer name">
  <br><br>
  <button id="start">Start</button>
</div>

<div id="game" style="display:none">
  <p id="playerInfo"></p>
  <button id="roll">Roll Pokémon</button>
  <div id="result" class="card common">Roll to begin</div>
  <p>Rolls: <span id="rolls">0</span></p>
  <p>Best: <span id="best">None</span></p>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

/* ---------------- DATA ---------------- */

const rarityTable=[
 {name:"Common",class:"common",chance:70,rank:1,pool:[
  "Bulbasaur","Charmander","Squirtle","Caterpie","Weedle","Pidgey","Rattata","Spearow"
 ]},
 {name:"Uncommon",class:"uncommon",chance:20,rank:2,pool:[
  "Ivysaur","Charmeleon","Wartortle","Pidgeotto","Raticate","Fearow"
 ]},
 {name:"Rare",class:"rare",chance:8,rank:3,pool:[
  "Venusaur","Charizard","Blastoise","Pidgeot"
 ]},
 {name:"Ultra",class:"ultra",chance:1.5,rank:4,pool:[
  "Dragonite","Snorlax"
 ]},
 {name:"Mythical",class:"mythical",chance:.5,rank:5,pool:[
  "Mewtwo","Mew","Lugia","Ho-Oh","Celebi"
 ]}
];

const megaList=new Set([
 "Venusaur","Charizard","Blastoise","Pidgeot","Mewtwo"
]);

const dexOrder=[
 "Bulbasaur","Ivysaur","Venusaur",
 "Charmander","Charmeleon","Charizard",
 "Squirtle","Wartortle","Blastoise",
 "Caterpie","Weedle","Pidgey","Pidgeotto","Pidgeot",
 "Rattata","Raticate","Spearow","Fearow",
 "Dragonite","Snorlax","Mewtwo","Mew",
 "Lugia","Ho-Oh","Celebi"
];

/* ---------------- STATE ---------------- */

let player={
 name:"",
 rolls:0,
 bestRank:0,
 best:null,
 dex:{} // key => counts
};

const rarityMap={};
rarityTable.forEach(t=>t.pool.forEach(p=>rarityMap[p]=t.class));

/* ---------------- HELPERS ---------------- */

function save(){localStorage.setItem("pokeRNG",JSON.stringify(player))}
function load(){
 const d=localStorage.getItem("pokeRNG");
 if(d){
  player=JSON.parse(d);
  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";
  updateUI();
 }
}

function rollRarity(){
 let r=Math.random()*100,sum=0;
 for(const t of rarityTable){
  sum+=t.chance;
  if(r<=sum) return t;
 }
 return rarityTable[0];
}

/* ---------------- DEX ---------------- */

function renderDex(filter=""){
 const dex=document.getElementById("dex");
 dex.innerHTML="";
 dexOrder.forEach((p,i)=>{
  if(filter && !p.toLowerCase().includes(filter)) return;

  const baseKey=p;
  const megaKey=p+"-Mega";

  [baseKey, megaList.has(p)?megaKey:null].forEach((key,isMega)=>{
   if(!key) return;
   const div=document.createElement("div");
   div.className="dex-entry "+(rarityMap[p]||"");
   if(player.dex[key]) div.classList.add("collected");

   div.textContent=
    String(i+1).padStart(3,"0")+" — "+
    p+(isMega?" ⛉":" ⛊")+
    (player.dex[key]?.shiny?" ★":" ☆");

   dex.appendChild(div);
  });
 });
}

/* ---------------- UI ---------------- */

function updateUI(){
 document.getElementById("playerInfo").textContent="Trainer: "+player.name;
 document.getElementById("rolls").textContent=player.rolls;
 document.getElementById("best").textContent=player.best||"None";
 renderDex(document.getElementById("dexSearch").value.toLowerCase());
}

/* ---------------- ROLL ---------------- */

document.getElementById("roll").onclick=()=>{
 const tier=rollRarity();
 const p=tier.pool[Math.floor(Math.random()*tier.pool.length)];

 const shiny=Math.random()<0.01;
 const mega=megaList.has(p)&&Math.random()<0.005;

 const key=p+(mega?"-Mega":"");
 player.rolls++;

 if(!player.dex[key]) player.dex[key]={count:0,shiny:false};
 player.dex[key].count++;
 if(shiny) player.dex[key].shiny=true;

 if(tier.rank>player.bestRank){
  player.bestRank=tier.rank;
  player.best=p+(mega?" ⛂":"")+(shiny?" ★":"")+" ("+tier.name+")";
 }

 const card=document.getElementById("result");
 card.className="card "+tier.class;
 card.innerHTML=`<div>${p}${mega?" <span style='color:red'>⛂</span>":" ⛀"}${shiny?" ★":""}</div><small>${tier.name}</small>`;

 save(); updateUI();
};

/* ---------------- START ---------------- */

document.getElementById("start").onclick=()=>{
 const name=document.getElementById("username").value.trim();
 if(!name) return alert("Enter name");
 player={name,rolls:0,bestRank:0,best:null,dex:{}};
 document.getElementById("login").style.display="none";
 document.getElementById("game").style.display="block";
 save(); updateUI();
};

document.getElementById("dexSearch").oninput=e=>renderDex(e.target.value.toLowerCase());

load();
});
</script>
</body>
</html>
