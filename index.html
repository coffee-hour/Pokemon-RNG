<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* --- CSS STYLES --- */
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 20px;
  display: flex;
  height: 100vh;
  box-sizing: border-box;
  overflow: hidden;
}

/* Sidebar (Pokédex) */
#pokedexSidebar {
  width: 280px;
  min-width: 280px;
  margin-right: 20px;
  display: flex;
  flex-direction: column;
  background: rgba(0, 0, 0, 0.3);
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #333;
  height: 95%;
}

#dexSearch {
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  background: #1e2240;
  color: white;
  width: 100%;
  box-sizing: border-box;
}

#pokedexDropdown {
  flex: 1;
  overflow-y: auto;
  border-top: 2px solid #444;
  padding-top: 10px;
  padding-right: 5px;
}

#pokedexDropdown::-webkit-scrollbar { width: 8px; }
#pokedexDropdown::-webkit-scrollbar-track { background: #0a0c1a; }
#pokedexDropdown::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

/* Dex Entry Base Styling */
.dex-entry {
  padding: 6px 10px;
  border-radius: 4px;
  margin-bottom: 4px;
  font-size: 13px;
  font-weight: 600;
  cursor: default;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.02);
  opacity: 0.5; /* Dim if not caught */
  border-left: 4px solid transparent;
  transition: opacity 0.2s;
}

.dex-entry.collected { 
  opacity: 1; 
  background: rgba(0,0,0,0.4); 
}

/* --- UPDATED RARITY COLORS (SIDEBAR) --- */

/* Common: Light Gray */
.dex-entry.common { border-color: #d3d3d3; color: #d3d3d3; }
.dex-entry.common.collected { background: linear-gradient(90deg, rgba(211,211,211,0.1), transparent); }

/* Uncommon: Green */
.dex-entry.uncommon { border-color: #4caf50; color: #4caf50; }
.dex-entry.uncommon.collected { background: linear-gradient(90deg, rgba(76,175,80,0.1), transparent); }

/* Rare: Blue */
.dex-entry.rare { border-color: #2196f3; color: #2196f3; }
.dex-entry.rare.collected { background: linear-gradient(90deg, rgba(33,150,243,0.1), transparent); }

/* Ultra: Purple */
.dex-entry.ultra { border-color: #9c27b0; color: #ce93d8; }
.dex-entry.ultra.collected { background: linear-gradient(90deg, rgba(156,39,176,0.1), transparent); }

/* Mythical: Pink */
.dex-entry.mythical { border-color: #e91e63; color: #ff80ab; text-shadow: 0 0 5px rgba(233,30,99,0.5); }
.dex-entry.mythical.collected { background: linear-gradient(90deg, rgba(233,30,99,0.15), transparent); }

/* Mega: Blood Orange */
.dex-entry.mega { border-color: #ff4500; color: #ff5722; text-shadow: 0 0 5px rgba(255,69,0,0.5); }
.dex-entry.mega.collected { background: linear-gradient(90deg, rgba(255,69,0,0.15), transparent); }


/* Main Content */
#mainContent {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

h1 { margin-top: 0; text-shadow: 0 0 10px #7b2cbf; }

/* Login Area */
#login {
  background: #16193b;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  border: 1px solid #333;
}

/* Game Area */
#game {
  width: 100%;
  max-width: 600px;
  text-align: center;
}

/* The Card */
.card-container {
  perspective: 1000px;
  margin: 30px auto;
  width: 300px;
  height: 200px;
}

.card {
  width: 100%;
  height: 100%;
  border-radius: 15px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 24px;
  font-weight: bold;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  position: relative;
  transition: transform 0.2s;
  border: 4px solid #333;
  text-align: center;
  padding: 10px;
  box-sizing: border-box;
}

.pop-anim { animation: POP 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

@keyframes POP {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

/* --- UPDATED RARITY COLORS (CARD) --- */
.card.common { color: #d3d3d3; border-color: #a0a0a0; box-shadow: 0 0 10px #a0a0a0 inset; }
.card.uncommon { color: #4caf50; border-color: #2e7d32; box-shadow: 0 0 15px #2e7d32 inset; }
.card.rare { color: #2196f3; border-color: #1565c0; box-shadow: 0 0 20px #1565c0 inset; }
.card.ultra { color: #ce93d8; border-color: #9c27b0; box-shadow: 0 0 25px #9c27b0 inset; }
.card.mythical { color: #ff80ab; border-color: #e91e63; box-shadow: 0 0 30px #e91e63 inset; text-shadow: 0 0 5px #e91e63; }
.card.mega { color: #ff5722; border-color: #bf360c; box-shadow: 0 0 30px #bf360c inset; text-shadow: 0 0 5px #ff5722; }

/* Shiny Animation */
.is-shiny {
  background: linear-gradient(135deg, #222, #000);
  background-size: 400% 400%;
  animation: shinyBG 3s ease infinite;
}
.is-shiny::after {
  content: "★ SHINY ★";
  position: absolute;
  top: -15px;
  background: red;
  color: white;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  box-shadow: 0 0 10px red;
}

@keyframes shinyBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Buttons */
button, input { padding: 12px 20px; margin: 8px; border-radius: 8px; border: none; font-size: 16px; outline: none; }
button { background: #ff4757; color: white; cursor: pointer; transition: 0.2s; font-weight: bold; }
button:hover { background: #ff6b81; transform: translateY(-2px); }
button:disabled { background: #555; cursor: not-allowed; transform: none; }
input { background: #eee; color: #333; }

.stats-box {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 10px;
  margin-top: 20px;
  display: inline-block;
  min-width: 200px;
}

#notificationArea {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
  z-index: 1000;
}
.toast {
  background: rgba(46, 204, 113, 0.9);
  color: #fff;
  padding: 10px 20px;
  border-radius: 5px;
  animation: fadeOut 3s forwards;
  pointer-events: auto;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}
@keyframes fadeOut { 0% {opacity:0; transform: translateY(10px);} 10% {opacity:1; transform: translateY(0);} 90% {opacity:1;} 100% {opacity:0; display:none;} }

/* --- SECRET BUTTON STYLE --- */
#secretTrigger {
  position: fixed;
  bottom: 5px;
  right: 10px;
  color: #444;
  font-size: 18px;
  cursor: pointer;
  opacity: 0.3;
  transition: opacity 0.3s;
  z-index: 9999;
}
#secretTrigger:hover {
  opacity: 1;
  color: #fff;
}

</style>

function startGame() {
  loginScreen.style.display = "none";
  gameScreen.style.display = "block";
  renderDex();
  updateStats();
  save();
}

function performSingleRoll() {
  player.totalRolls++;
  
  let rand = Math.random() * 100;
  let chosenTier = rarityTable[0];
  let cumulative = 0;
  
  for(let tier of rarityTable) {
    cumulative += tier.chance;
    if(rand < cumulative) {
      chosenTier = tier;
      break;
    }
  }
  
  const pool = chosenTier.pool;
  const pickedName = pool[Math.floor(Math.random() * pool.length)];
  
  let baseName = pickedName;
  let isMegaPull = false;
  
  if(chosenTier.name === "Mega") {
    isMegaPull = true;
    baseName = megaMap[pickedName]; 
  }
  
  const isShiny = (Math.floor(Math.random() * SHINY_ODDS) === 0);
  
  if(!player.pokedex[baseName]) {
    player.pokedex[baseName] = { count: 0, shiny: 0, mega: {} };
  }
  
  player.pokedex[baseName].count++;
  
  if(isShiny) {
    player.pokedex[baseName].shiny++;
  }
  
  if(isMegaPull) {
    player.pokedex[baseName].mega[pickedName] = true;
  }
  
  return {
    name: pickedName,
    base: baseName,
    tier: chosenTier,
    shiny: isShiny,
    mega: isMegaPull
  };
}

function updateUI(lastRoll) {
  resultCard.className = `card ${lastRoll.tier.class}`;
  if(lastRoll.shiny) resultCard.classList.add("is-shiny");
  
  resultCard.classList.remove("pop-anim");
  void resultCard.offsetWidth; 
  resultCard.classList.add("pop-anim");
  
  cardName.innerText = lastRoll.name;
  cardRarity.innerText = lastRoll.shiny ? `✨ Shiny ${lastRoll.tier.name} ✨` : lastRoll.tier.name;
  
  updateStats();
  renderDex(dexSearch.value);
}

function updateStats() {
  rollsText.innerText = player.totalRolls.toLocaleString();
  caughtText.innerText = Object.keys(player.pokedex).length;
  rollMultDisplay.innerText = player.rollMultiplier;
}

function renderDex(filter = "") {
  pokedexDropdown.innerHTML = "";
  
  genAllOrder.forEach((p, index) => {
    if(filter && !p.toLowerCase().includes(filter.toLowerCase())) return;
    
    const entry = player.pokedex[p];
    const div = document.createElement("div");
    
    // 1. Get Rarity Class
    const rarityClass = rarityMap[p] || "common";
    
    // 2. Add rarity class to div
    div.className = `dex-entry ${rarityClass}`;
    
    if(entry) div.classList.add("collected");
    
    let html = `<span>#${String(index+1).padStart(3,"0")} ${p}</span>`;
    let icons = "<span>";
    
    if(entry) {
      if(entry.shiny > 0) {
        div.classList.add("shiny");
        icons += " <span style='color:red'>★</span>";
      } else {
        icons += " <span style='color:rgba(255,255,255,0.2)'>☆</span>";
      }
      
      if(megaEligible.has(p)) {
        const hasMega = Object.keys(entry.mega || {}).length > 0;
        icons += hasMega ? " <span style='color:gold'>⚡</span>" : " <span style='color:rgba(255,255,255,0.2)'>◇</span>";
      }
    } else {
      div.style.opacity = "0.3";
    }
    
    icons += "</span>";
    div.innerHTML = html + icons;
    
    pokedexDropdown.appendChild(div);
  });
}

// --- REWARDS SYSTEM ---
function checkRewards() {
  if (!player.rewards) player.rewards = {};
  
  const rollMilestones = [
    { target: 100, id: "r100", action: () => addMultiplier(1) },
    { target: 500, id: "r500", action: () => addMultiplier(1) },
    { target: 1000, id: "r1000", action: () => addMultiplier(1) },
    { target: 5000, id: "r5000", action: () => addMultiplier(1) },
    { target: 10000, id: "r10000", action: () => addMultiplier(2) },
    { target: 100000, id: "r100000", action: () => addMultiplier(5) },
  ];

  rollMilestones.forEach(m => {
    if(player.totalRolls >= m.target && !player.rewards[m.id]) {
      player.rewards[m.id] = true;
      m.action();
      notify(`Milestone: ${m.target} Rolls! +Roll Multiplier!`);
    }
  });
  
  const totalMons = genAllOrder.length;
  const currentCaught = Object.keys(player.pokedex).length;
  
  if(currentCaught >= totalMons && totalMons > 0 && !player.rewards["baseDex"]) {
    player.rewards["baseDex"] = true;
    addMultiplier(5);
    notify("MASTER: Pokedex Complete! Huge Bonus!");
  }
}

function addMultiplier(amount) {
  player.rollMultiplier += amount;
  updateStats();
}

// --- SAVE / LOAD SYSTEM ---
function save(){ 
  player.lastSave = Date.now();
  localStorage.setItem("pokemonRNG", JSON.stringify(player));
  const date = new Date(player.lastSave);
  lastSaveText.innerText = date.toLocaleTimeString();
}

function load(){ 
  const data = localStorage.getItem("pokemonRNG"); 
  if(data){ 
    try {
      const parsed = JSON.parse(data);
      player = { ...player, ...parsed };
      
      if(!player.pokedex) player.pokedex = {};
      if(!player.rewards) player.rewards = {};
      if(!player.rollMultiplier) player.rollMultiplier = 1;

      console.log("Save loaded:", player);
      startGame();
    } catch (e) {
      console.error("Save file corrupted", e);
      notify("Save file corrupted or old version.");
    }
  } else {
    console.log("No save found.");
  }
}

function resetData() {
  if(confirm("Are you sure you want to wipe your save?")) {
    localStorage.removeItem("pokemonRNG");
    location.reload();
  }
}

function notify(msg) {
  const area = document.getElementById("notificationArea");
  if(!area) return;
  const div = document.createElement("div");
  div.className = "toast";
  div.innerText = msg;
  area.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}
</script>
