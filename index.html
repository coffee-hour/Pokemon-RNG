<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG – Rarity Layer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0a0c1a;
  color:#fff;
  font-family:Arial, sans-serif;
  text-align:center;
  padding:30px;
}

button, input {
  padding:12px;
  margin:10px;
  font-size:16px;
}

#game { display:none; }

.card {
  margin:20px auto;
  padding:20px;
  width:260px;
  border:2px solid #444;
}

.card.common { color:#aaa; }
.card.uncommon { color:#2ecc71; }
.card.rare { color:#3498db; }
.card.ultra { color:#9b59b6; }
.card.mythical { color:gold; }
</style>
</head>

<body>

<h1>Pokémon RNG – Rarity</h1>

<div id="login">
  <input id="usernameInput" placeholder="Username">
  <br>
  <button id="startBtn">Start Game</button>
</div>

<div id="game">
  <p id="playerInfo"></p>
  <button id="rollBtn">Roll Pokémon</button>
  <div id="result" class="card">Roll to begin</div>
  <p>Total Rolls: <span id="rolls">0</span></p>
  <p>Best Pull: <span id="best">None</span></p>
</div>

<script>
// ---------- RARITY TABLE ----------
const rarityTable = [
  { name:"Common", class:"common", chance:70, pool:["Pidgey","Rattata","Caterpie","Weedle","Zubat"], rank:1 },
  { name:"Uncommon", class:"uncommon", chance:20, pool:["Pidgeotto","Raticate","Metapod","Kakuna","Golbat"], rank:2 },
  { name:"Rare", class:"rare", chance:8, pool:["Pidgeot","Rhydon","Beedrill","Fearow","Arcanine"], rank:3 },
  { name:"Ultra", class:"ultra", chance:1.8, pool:["Dragonite","Gyarados","Snorlax","Lapras"], rank:4 },
  { name:"Mythical", class:"mythical", chance:0.2, pool:["Mew","Articuno","Zapdos","Moltres","Mewtwo"], rank:5 }
];

// ---------- PLAYER DATA ----------
let player = {
  username: "",
  rolls: 0,
  bestRank: 0,
  bestPull: null,
  pokedex: {} // Tracks total of each Pokémon rolled
};

// ---------- LOCAL STORAGE ----------
function save() {
  localStorage.setItem('pokemonRNGPlayer', JSON.stringify(player));
}

function load() {
  const saved = localStorage.getItem('pokemonRNGPlayer');
  if(saved){
    player = JSON.parse(saved);
    login.style.display = "none";
    game.style.display = "block";
    updateUI();
  }
}

// ---------- UPDATE UI ----------
function updateUI(){
  playerInfo.textContent = `Trainer: ${player.username}`;
  rolls.textContent = player.rolls;
  best.textContent = player.bestPull ?? "None";

  // Show pokedex summary
  let pokedexHTML = Object.keys(player.pokedex).length
    ? Object.entries(player.pokedex).map(([p, count]) => `${p}: ${count}`).join(" | ")
    : "No Pokémon yet!";
  document.getElementById('pokedex')?.remove();
  const pd = document.createElement("div");
  pd.id = "pokedex";
  pd.style.marginTop = "15px";
  pd.style.fontSize = "13px";
  pd.style.opacity = "0.8";
  pd.textContent = `Pokédex: ${pokedexHTML}`;
  game.appendChild(pd);
}

// ---------- ROLL FUNCTIONS ----------
function rollRarity(){
  let r = Math.random()*100, c=0;
  for(const x of rarityTable){
    c += x.chance;
    if(r <= c) return x;
  }
  return rarityTable[0];
}

rollBtn.onclick = () => {
  const rarity = rollRarity();
  const poke = rarity.pool[Math.floor(Math.random()*rarity.pool.length)];

  player.rolls++;

  // Update best pull
  if(rarity.rank > player.bestRank){
    player.bestRank = rarity.rank;
    player.bestPull = `${poke} (${rarity.name})`;
  }

  // Update Pokédex count
  if(player.pokedex[poke]) player.pokedex[poke]++;
  else player.pokedex[poke] = 1;

  // Update card display
  result.textContent = poke;
  result.className = `card ${rarity.class}`;

  // Screen shake for rare pulls
  if(rarity.rank >= 4){ // Ultra or Mythical
    document.body.classList.add("shake");
    setTimeout(()=>document.body.classList.remove("shake"),400);
  }

  updateUI();
  save();
};

// ---------- START BUTTON ----------
startBtn.onclick = () => {
  const name = usernameInput.value.trim();
  if(!name){ alert("Please enter a username!"); return; }

  player.username = name;
  login.style.display = "none";
  game.style.display = "block";
  updateUI();
  save();
};

// ---------- LOAD ON START ----------
load();
</script>

</body>
</html>
