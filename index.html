<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {
  background: #0f1220;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
  overflow-x: hidden;
}

h1 { margin-bottom: 10px; }

input, button { padding: 10px; margin: 8px; border-radius: 8px; border: none; }
button { background: #ff4757; color: white; cursor: pointer; transition: 0.2s; }
button:hover { background: #ff6b81; }

#game, #login { margin-top: 20px; }
#result { margin: 20px auto; padding: 20px; max-width: 320px; border-radius: 15px; background: #1c1f3a; box-shadow: 0 0 20px rgba(0,0,0,0.4); font-size: 18px; transition: transform 0.3s ease; }

#leaderboardPanel {
  position: fixed;
  top: 20px;
  right: -260px;
  width: 240px;
  background: #1c1f3a;
  padding: 15px;
  border-radius: 12px 0 0 12px;
  transition: right 0.3s;
  font-size: 13px;
}
#leaderboardPanel.open { right: 0; }

#leaderboardToggle {
  position: fixed;
  top: 20px;
  right: 0;
  background: #3498db;
  border-radius: 8px 0 0 8px;
}

table { width: 100%; }
td { padding: 4px; text-align: left; }
.confetti-piece {
  position: absolute;
  width: 10px; height: 10px;
  background: gold;
  pointer-events: none;
  animation: fall 1s linear forwards;
}
@keyframes fall { 100% { transform: translateY(600px) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<h1>🎲 Pokémon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Enter Username">
  <button id="startBtn">Start</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>
  <button id="rollBtn">🎲 Roll Pokémon</button>
  <div id="result">Roll to begin</div>
  <p>Total Rolls: <span id="rolls">0</span></p>
  <p>Best Pull: <span id="best">None</span></p>
</div>

<button id="leaderboardToggle">🏆</button>
<div id="leaderboardPanel">
  <h3>Leaderboard</h3>
  <table id="leaderboard"></table>
</div>

<script>
/* ---------- SUPABASE SETUP ---------- */
const SUPABASE_URL = "https://mlkhgrkayqwqlvzagvjq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2hncmtheXF3cWx2emFndmpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNDE3MDEsImV4cCI6MjA4MzkxNzcwMX0.YzCjC52nhY829bxDeAoipdXq-6Heu7sPtbKmg1mpV1s";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---------- GAME DATA ---------- */
const rarityTable = [
  { name:"Common", chance:70, rank:1, pool:["Pidgey","Rattata"] },
  { name:"Uncommon", chance:20, rank:2, pool:["Machop","Abra"] },
  { name:"Rare", chance:8, rank:3, pool:["Riolu","Gible"] },
  { name:"Ultra Rare", chance:1.8, rank:4, pool:["Dragonite"] },
  { name:"Mythical", chance:0.2, rank:5, pool:["Mew"] }
];
const SHINY_RATE = 4096;
const PITY_THRESHOLD = 50; // guaranteed Rare+ after 50 rolls

let player = null;

/* ---------- LOGIN / SIGNUP ---------- */
document.getElementById("startBtn").onclick = async () => {
  const username = usernameInput.value.trim();
  if(!username) return alert("Enter a username");

  let { data } = await supabase.from("players").select("*").eq("username", username).single();

  if(!data){
    const res = await supabase.from("players").insert({ username, total_rolls:0, best_pull_rank:0, pity_count:0 }).select().single();
    player = res.data;
  } else {
    player = data;
  }

  login.style.display = "none";
  game.style.display = "block";
  playerInfo.textContent = `Player: ${player.username}`;
  updateUI();
  loadLeaderboard();
};

/* ---------- ROLL ---------- */
document.getElementById("rollBtn").onclick = async () => {
  let rarity;
  player.pity_count = player.pity_count || 0;
  player.pity_count++;

  // Pity system
  if(player.pity_count >= PITY_THRESHOLD){
    rarity = rarityTable.find(r => r.rank >= 3); // Rare+ guaranteed
    player.pity_count = 0;
  } else {
    rarity = rollRarity();
    if(rarity.rank >= 3) player.pity_count = 0;
  }

  const pokemon = rarity.pool[Math.floor(Math.random()*rarity.pool.length)];
  player.total_rolls++;
  if(!player.best_pull_rank || rarity.rank > player.best_pull_rank){
    player.best_pull_rank = rarity.rank;
    player.best_pull = `${pokemon} (${rarity.name})`;
    if(rarity.rank === 5) showConfetti();
    // Update leaderboard
    await supabase.from("leaderboard").upsert({ username: player.username, best_pull: player.best_pull, best_pull_rank: player.best_pull_rank });
  }

  // Save player data
  await supabase.from("players").update({ total_rolls: player.total_rolls, best_pull: player.best_pull, best_pull_rank: player.best_pull_rank, pity_count: player.pity_count }).eq("username", player.username);

  result.textContent = `${pokemon} (${rarity.name})`;
  updateUI();
  loadLeaderboard();
};

function rollRarity(){
  let r = Math.random()*100, c=0;
  for(let x of rarityTable){ c+=x.chance; if(r<=c) return x; }
  return rarityTable[0];
}

/* ---------- UI ---------- */
function updateUI(){
  rolls.textContent = player.total_rolls;
  best.textContent = player.best_pull || "None";
}

async function loadLeaderboard(){
  const { data } = await supabase.from("leaderboard").select("*").order("best_pull_rank",{ascending:false}).limit(10);
  leaderboard.innerHTML = data.map(r => `<tr><td>${r.username}</td><td>${r.best_pull}</td></tr>`).join("");
}

/* ---------- CONFETTI ---------- */
function showConfetti(){
  for(let i=0;i<50;i++){
    const div=document.createElement("div");
    div.className="confetti-piece";
    div.style.left=Math.random()*window.innerWidth+"px";
    div.style.background=`hsl(${Math.random()*360},100%,50%)`;
    div.style.animationDuration=0.7+Math.random()*0.5+"s";
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),1500);
  }
}

/* ---------- LEADERBOARD TOGGLE ---------- */
leaderboardToggle.onclick = ()=>leaderboardPanel.classList.toggle("open");
</script>
</body>
</html>
