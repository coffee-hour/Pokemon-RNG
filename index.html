<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: 'Trebuchet MS', Arial, sans-serif;
  text-align: center;
  padding: 30px;
  overflow-x: hidden;
}

h1 {
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(255,255,255,0.3);
}

input, button {
  padding: 12px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

button {
  background: linear-gradient(145deg, #ff4757, #ff6b81);
  color: white;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(255,71,87,0.4);
  transition: transform 0.2s;
}

button:hover {
  transform: scale(1.05);
}

#game { margin-top: 25px; }

/* Pokémon Card */
.card {
  margin: 25px auto;
  width: 260px;
  height: 180px;
  border-radius: 18px;
  background: linear-gradient(145deg, #22265c, #14183a);
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  animation: flipIn 0.6s ease;
}

.card small { font-size: 14px; opacity: 0.8; }

.card.common { color: #aaa; }
.card.uncommon { color: #2ecc71; }
.card.rare { color: #3498db; }
.card.ultra { color: #9b59b6; box-shadow: 0 0 35px #9b59b6; }
.card.mythical { color: gold; box-shadow: 0 0 50px gold; animation: pulse 1s infinite; }

@keyframes flipIn { from { transform: rotateY(90deg) scale(0.8); opacity: 0; } to { transform: rotateY(0deg) scale(1); opacity: 1; } }
@keyframes pulse { 0% { box-shadow: 0 0 25px gold; } 50% { box-shadow: 0 0 55px gold; } 100% { box-shadow: 0 0 25px gold; } }
.shake { animation: shake 0.4s; }
@keyframes shake { 0%{transform:translateX(0);}25%{transform:translateX(-6px);}50%{transform:translateX(6px);}75%{transform:translateX(-4px);}100%{transform:translateX(0);} }

.stats { font-size: 14px; opacity: 0.9; }

/* Leaderboard */
#leaderboardPanel {
  position: fixed;
  top: 20px;
  right: -260px;
  width: 240px;
  background: #1c1f3a;
  padding: 15px;
  border-radius: 12px 0 0 12px;
  transition: right 0.3s;
  font-size: 13px;
}
#leaderboardPanel.open { right: 0; }
#leaderboardToggle {
  position: fixed;
  top: 20px;
  right: 0;
  background: #3498db;
  border-radius: 8px 0 0 8px;
}
table { width: 100%; border-collapse: collapse; }
td { padding: 4px; text-align: left; }
</style>
</head>

<body>

<h1>🎲 Pokémon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Enter username">
  <br>
  <button id="startBtn">Start Game</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>
  <button id="rollBtn">🎲 Roll Pokémon</button>
  <div id="result" class="card common">Roll to begin!</div>
  <div class="stats">
    <p>Total Rolls: <span id="rolls">0</span></p>
    <p>Best Pull: <span id="best">None</span></p>
  </div>
</div>

<button id="leaderboardToggle">🏆</button>
<div id="leaderboardPanel">
  <h3>Leaderboard</h3>
  <table id="leaderboard"></table>
</div>

<script>
/* ---------- SUPABASE ---------- */
const SUPABASE_URL = "https://mlkhgrkayqwqlvzagvjq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2hncmtheXF3cWx2emFndmpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNDE3MDEsImV4cCI6MjA4MzkxNzcwMX0.YzCjC52nhY829bxDeAoipdXq-6Heu7sPtbKmg1mpV1s";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---------- GEN 1 POKEMON POOLS ---------- */
const rarityTable = [
  { name:"Common", class:"common", chance:70, pool:[
    "Pidgey","Rattata","Caterpie","Weedle","Spearow","Ekans","Sandshrew","Nidoran♀","Nidoran♂","Zubat","Oddish","Paras","Venonat","Diglett","Meowth","Psyduck","Mankey","Poliwag","Bellsprout","Geodude"
  ] },
  { name:"Uncommon", class:"uncommon", chance:20, pool:[
    "Pidgeotto","Raticate","Metapod","Kakuna","Fearow","Arbok","Sandslash","Nidorina","Nidorino","Golbat","Gloom","Parasect","Venomoth","Dugtrio","Persian","Golduck","Primeape","Poliwhirl","Weepinbell","Graveler"
  ] },
  { name:"Rare", class:"rare", chance:8, pool:[
    "Pidgeot","Rhydon","Beedrill","Fearow","Arcanine","Nidoking","Nidoqueen","Venusaur","Charmeleon","Wartortle","Raichu","Machoke","Machamp","Golem","Rapidash","Poliwrath","Kadabra","Alakazam","Hitmonlee","Hitmonchan"
  ] },
  { name:"Ultra", class:"ultra", chance:1.8, pool:[
    "Dragonite","Mewtwo","Gyarados","Snorlax","Lapras"
  ] },
  { name:"Mythical", class:"mythical", chance:0.2, pool:[
    "Mew","Articuno","Zapdos","Moltres","Celebi"
  ] }
];

let player = { username: "", totalRolls:0, bestRank:0, bestPull:null };

/* ---------- LOGIN ---------- */
startBtn.addEventListener("click", async () => {
  const name = usernameInput.value.trim();
  if(!name) { alert("Enter a username!"); return; }

  player.username = name;

  // Load or create player in Supabase
  let { data } = await supabase.from("players").select("*").eq("username", player.username).single();
  if(!data) {
    const res = await supabase.from("players").insert({ username: player.username, total_rolls:0, best_pull_rank:0 }).select().single();
    player = res.data;
  } else { player = data; }

  login.style.display="none";
  game.style.display="block";
  playerInfo.textContent = `Trainer: ${player.username}`;
  updateUI();
  loadLeaderboard();
});

/* ---------- ROLL ---------- */
rollBtn.addEventListener("click", async () => {
  const rarity = rollRarity();
  const pokemon = rarity.pool[Math.floor(Math.random()*rarity.pool.length)];

  player.totalRolls++;
  if(rarityTable.indexOf(rarity)+1 > (player.bestRank || 0)) {
    player.bestRank = rarityTable.indexOf(rarity)+1;
    player.bestPull = `${pokemon} (${rarity.name})`;
    // Update leaderboard
    await supabase.from("leaderboard").upsert({
      username: player.username,
      best_pull: player.bestPull,
      best_pull_rank: player.bestRank
    });
  }

  // Save player data
  await supabase.from("players").update({ total_rolls: player.totalRolls, best_pull_rank: player.bestRank, best_pull: player.bestPull }).eq("username", player.username);

  result.className = `card ${rarity.class}`;
  result.innerHTML = `<div>${pokemon}</div><small>${rarity.name}</small>`;
  if(rarity.name==="Ultra" || rarity.name==="Mythical"){ document.body.classList.add("shake"); setTimeout(()=>document.body.classList.remove("shake"),400); }

  updateUI();
  loadLeaderboard();
});

function rollRarity(){ 
  let r = Math.random()*100, c=0;
  for(const x of rarityTable){ c+=x.chance; if(r<=c) return x; }
  return rarityTable[0]; 
}

function updateUI(){
  rolls.textContent = player.totalRolls;
  best.textContent = player.bestPull ?? "None";
}

/* ---------- LEADERBOARD ---------- */
async function loadLeaderboard(){
  const { data } = await supabase.from("leaderboard").select("*").order("best_pull_rank",{ascending:false}).limit(10);
  leaderboard.innerHTML = data.map(r => `<tr><td>${r.username}</td><td>${r.best_pull}</td></tr>`).join("");
}

leaderboardToggle.onclick = ()=>leaderboardPanel.classList.toggle("open");
</script>

</body>
</html>

/* ---------- LEADERBOARD TOGGLE ---------- */
leaderboardToggle.onclick = ()=>leaderboardPanel.classList.toggle("open");
</script>
</body>
</html>
