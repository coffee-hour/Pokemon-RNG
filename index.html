<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color:#fff;
  font-family: Arial, sans-serif;
  display:flex;
}

/* Sidebar */
#pokedexSidebar{
  width:240px;
  padding:10px;
  background:#0f1233;
}

#dexSearch{
  width:100%;
  padding:8px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

#pokedexDropdown{
  max-height:80vh;
  overflow-y:auto;
}

/* Dex entries */
.dex-entry{
  font-size:13px;
  padding:4px 6px;
  margin:3px 0;
  border-radius:6px;
  opacity:0.35;
}
.dex-entry.collected{opacity:1}

/* Rarity colors */
.common{background:#b0bec5;color:#000}
.rare{background:#42a5f5}
.ultra{background:#ab47bc}
.legendary{background:gold;color:#000}
.mythical{background:linear-gradient(45deg,gold,orange);color:#000}
.paradox{background:#ff5252}
.ultrabeast{background:#00e5ff;color:#000}

/* Main */
#mainContent{
  flex:1;
  text-align:center;
  padding:30px;
  position:relative;
  z-index:5;
}

button,input{
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

button{
  background:#ff4757;
  color:white;
  cursor:pointer;
}

/* Card */
.card{
  margin:20px auto;
  width:260px;
  height:160px;
  border-radius:16px;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  font-size:22px;
  animation:pop .4s ease;
}

@keyframes pop{
  from{transform:scale(.8);opacity:0}
  to{transform:scale(1);opacity:1}
}

.mega{
  color:red;
  font-weight:bold;
  text-shadow:0 0 6px red;
}
.shiny{
  color:gold;
  text-shadow:0 0 6px gold;
}
</style>
</head>

<body>

<div id="pokedexSidebar">
  <input id="dexSearch" placeholder="Search…">
  <div id="pokedexDropdown"></div>
</div>

<div id="mainContent">
<h1>🎲 Pokémon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Username">
  <br><br>
  <button id="startBtn">Start</button>
</div>

<div id="game" style="display:none">
  <p id="playerInfo"></p>
  <button id="rollBtn">Roll Pokémon</button>
  <div id="result" class="card">Roll to begin</div>
  <p>Rolls: <span id="rolls">0</span></p>
  <p>Best: <span id="best">None</span></p>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

/* ---- MEGA-ABLE POKÉMON ---- */
const megaSet = new Set([
  "Venusaur","Charizard","Blastoise","Beedrill","Pidgeot","Alakazam",
  "Gengar","Kangaskhan","Pinsir","Gyarados","Aerodactyl","Mewtwo",
  "Ampharos","Steelix","Scizor","Heracross","Houndoom","Tyranitar"
]);

/* ---- SIMPLE DEX ORDER (trimmed example) ---- */
const dexOrder = [
  "Bulbasaur","Ivysaur","Venusaur",
  "Charmander","Charmeleon","Charizard",
  "Squirtle","Wartortle","Blastoise",
  "Mewtwo","Mew"
];

/* ---- RARITY POOLS ---- */
const rarities = [
  {name:"Common",class:"common",chance:70,pool:["Bulbasaur","Charmander","Squirtle"]},
  {name:"Rare",class:"rare",chance:20,pool:["Ivysaur","Charmeleon","Wartortle"]},
  {name:"Ultra",class:"ultra",chance:7,pool:["Venusaur","Charizard","Blastoise"]},
  {name:"Legendary",class:"legendary",chance:2,pool:["Mewtwo"]},
  {name:"Mythical",class:"mythical",chance:1,pool:["Mew"]}
];

const rarityMap={};
rarities.forEach(r=>r.pool.forEach(p=>rarityMap[p]=r.class));

/* ---- PLAYER ---- */
let player=null;

const login=document.getElementById("login");
const game=document.getElementById("game");
const result=document.getElementById("result");

/* ---- SAVE / LOAD ---- */
function save(){
  localStorage.setItem("pokemonRNG",JSON.stringify(player));
}

function load(){
  const d=localStorage.getItem("pokemonRNG");
  if(d){
    player=JSON.parse(d);
    login.style.display="none";
    game.style.display="block";
    updateUI();
  }
}

/* ---- DEX ---- */
function renderDex(filter=""){
  const dex=document.getElementById("pokedexDropdown");
  dex.innerHTML="";
  dexOrder.forEach((p,i)=>{
    if(filter && !p.toLowerCase().includes(filter.toLowerCase()))return;
    const d=document.createElement("div");
    d.className="dex-entry "+(rarityMap[p]||"common");
    if(player && player.dex[p]){
      d.classList.add("collected");
      d.innerHTML=`${String(i+1).padStart(3,"0")} ${p}
        ${player.dex[p].shiny?"<span class='shiny'>★</span>":"☆"}
        ${player.dex[p].mega?"<span class='mega'>⛂</span>":"⛀"}`;
    }else{
      d.textContent=`${String(i+1).padStart(3,"0")} ????`;
    }
    dex.appendChild(d);
  });
}

/* ---- UI ---- */
function updateUI(){
  document.getElementById("playerInfo").textContent="Trainer: "+player.username;
  document.getElementById("rolls").textContent=player.rolls;
  document.getElementById("best").textContent=player.best||"None";
  renderDex(document.getElementById("dexSearch").value);
}

/* ---- ROLL ---- */
function rollRarity(){
  let r=Math.random()*100,sum=0;
  for(const x of rarities){sum+=x.chance;if(r<=sum)return x;}
}

document.getElementById("rollBtn").onclick=()=>{
  const r=rollRarity();
  const p=r.pool[Math.floor(Math.random()*r.pool.length)];
  const shiny=Math.random()<0.001;
  const mega=megaSet.has(p)&&Math.random()<0.005;

  player.rolls++;

  if(!player.dex[p])player.dex[p]={shiny:false,mega:false};
  if(shiny)player.dex[p].shiny=true;
  if(mega)player.dex[p].mega=true;

  result.innerHTML=`
    <div>
      ${shiny?"<span class='shiny'>✨</span> ":""}
      ${p}
      ${mega?" <span class='mega'>⛂</span>":""}
    </div>
    <small>${r.name}</small>
  `;

  save();
  updateUI();
};

/* ---- START ---- */
document.getElementById("startBtn").onclick=()=>{
  const name=document.getElementById("usernameInput").value.trim();
  if(!name)return alert("Enter a username");
  player={username:name,rolls:0,best:null,dex:{}};
  login.style.display="none";
  game.style.display="block";
  save();
  updateUI();
};

document.getElementById("dexSearch").oninput=e=>renderDex(e.target.value);

load();
});
</script>
</body>
</html>
