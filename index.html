<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: Arial, sans-serif;
  padding: 30px;
  display: flex;
  flex-direction: row;
}

/* Main content on right */
#mainContent {
  flex: 1;
  text-align: center;
}

/* Pokédex sidebar on left */
#pokedexSidebar {
  width: 220px;
  margin-right: 20px;
  display: flex;
  flex-direction: column;
}

/* Search box */
#dexSearch {
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

/* Dropdown / scrollable Pokédex */
#pokedexDropdown {
  display: block;
  max-height: 600px;
  overflow-y: auto;
  border: 2px solid #444;
  border-radius: 10px;
  padding: 10px;
  background: #0f1233;
}

/* Dex entries */
.dex-entry {
  padding: 6px 10px;
  border-radius: 6px;
  margin: 4px;
  font-size: 14px;
  font-weight: 500;
  display: inline-block;
  opacity: 0.35;
}

.dex-entry.collected {
  opacity: 1;
}

/* Rarity colors */
.common { background:#b0bec5; color:#000; }
.uncommon { background:#66bb6a; color:#000; }
.rare { background:#42a5f5; color:#fff; }
.ultra { background:#ab47bc; color:#fff; }
.mythical { background: linear-gradient(45deg, gold, orange); color:#000; font-weight:700; }
.mega { background: linear-gradient(45deg, crimson, gold); color: #000; font-weight: 700; box-shadow: 0 0 10px gold; }


/* Buttons */
button, input { padding: 10px; margin: 6px; border-radius: 10px; border: none; font-size: 14px; }
button { background: #ff4757; color: white; cursor: pointer; }

.card {
  margin: 20px auto;
  width: 250px;
  height: 160px;
  border-radius: 15px;
  background: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 20px;
  transition: transform 0.5s ease, color 0.5s ease;
  animation: POP 0.5s ease;
}

/* Card animation */
@keyframes POP {
  0% { transform: scale(0.8); opacity: 0; }
  50% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* Rarity text colors for card */
.card.common { color: gray; }
.card.uncommon { color: #2ecc71; }
.card.rare { color: #3498db; }
.card.ultra { color: #9b59b6; }
.card.mythical { color: gold; }
.card.mega { color: red; text-shadow: 0 0 8px crimson; }
</style>
</head>
<body>

<div id="pokedexSidebar">
  <input id="dexSearch" placeholder="Search Pokémon...">
  <div id="pokedexDropdown" class="dex-grid"></div>
</div>

<div id="mainContent">
<h1>🎲 Pokemon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Username">
  <br>
  <button id="startBtn">Start</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>
  <button id="rollBtn">Roll Pokemon</button>
  <div id="result" class="card common">Roll to begin</div>
  <p>Rolls: <span id="rolls">0</span></p>
  <p>Best: <span id="best">None</span></p>
</div>
</div>

  username: "",

const login = document.getElementById("login");

// Save/load
function save(){ localStorage.setItem("pokemonRNG", JSON.stringify(player)); }
function load(){ 
  const data = localStorage.getItem("pokemonRNG"); 
  if(data){ player=JSON.parse(data); login.style.display="none"; game.style.display="block"; 
  if (!player.rollMultiplier) player.rollMultiplier += 1;
  if (!player.rewards) player.rewards = {};
  if (!player.autoCollector) player.autoCollector = 0;
updateUI(); }
}

// Render Dex
function renderDex(filter = ""){
  pokedexDropdown.innerHTML = "";

  genAllOrder.forEach((p, index) => {
    if(filter && !p.toLowerCase().includes(filter.toLowerCase())) return;

    const div = document.createElement("div");
    const rarityClass = rarityMap[p] || "common";
    div.className = "dex-entry " + rarityClass;

    const entry = player.pokedex[p];
    div.textContent = `${String(index+1).padStart(3,"0")} — ${p}`;

    if(entry){
      div.classList.add("collected");

      // Shiny indicator
      const shinyIcon = document.createElement("span");
      shinyIcon.textContent = entry.shiny > 0 ? " ★" : " ☆";
      shinyIcon.style.color = entry.shiny > 0 ? "red" : "#666";
      div.appendChild(shinyIcon);

      // Mega indicator (ONLY if eligible)
      if(megaEligible.has(p)){
        const hasMega = Object.keys(entry.mega || {}).length > 0;
        const megaIcon = document.createElement("span");
        megaIcon.textContent = hasMega ? " ⚡" : " ◇";
        megaIcon.style.color = hasMega ? "gold" : "#666";
        div.appendChild(megaIcon);
      }

    } else {
      // Not owned at all
      const missing = document.createElement("span");
      missing.textContent = megaEligible.has(p) ? " ☆ ◇" : " ☆";
      missing.style.color = "#444";
      div.innerHTML = `${String(index+1).padStart(3,"0")} — ` +
  (entry
     ? `${pokemonData[p].sprite} ${pokemonData[p].name}`
     : "??????????");       
      div.appendChild(missing);
    }

    pokedexDropdown.appendChild(div);
  });
}

function checkRewards() {
  if (!player.rewards) player.rewards = {};

  const notifications = [];

  // Milestone rewards based on total rolls
  const rollMilestones = [
   if (player.totalRolls >= 1000 && !player.rewards.r2) {
  player.rollMultiplier += 1;
  player.rewards.r2 = true;
  notify("Unlocked +1 roll per click!");
}

if (player.totalRolls >= 100000 && !player.rewards.r3) {
  player.rollMultiplier += 1;
  player.rewards.r3 = true;
  notify("Unlocked +1 roll per click!");
}

if (player.totalRolls >= 1000000 && !player.rewards.r4) {
  player.rollMultiplier += 1;
  player.rewards.r4 = true;
  notify("Unlocked +1 roll per click!");
}

  ];

  rollMilestones.forEach(m => {
    if (player.totalRolls >= m.clicks && !player.rewards[m.clicks]) {
      notifications.push(m.action());
      player.rewards[m.clicks] = true;
    }
  });

  // Milestone rewards based on Pokédex completion
  const dexMilestones = [
    { check: () => Object.keys(player.pokedex).length >= genAllOrder.length, key: "baseDex", action: () => { player.rollMultiplier += 1; return "Completed Base Dex! You get an extra roll!"; } },
    { check: () => Object.values(player.pokedex).filter(p => p.shiny > 0).length >= genAllOrder.length, key: "shinyDex", action: () => { player.rollMultiplier += 1; return "Completed Shiny Dex! You get an extra roll!"; } },
    { check: () => Object.values(player.pokedex).filter(p => Object.keys(p.mega || {}).length > 0).length >= megaEligible.size, key: "megaDex", action: () => { player.rollMultiplier += 1; return "Completed Mega Dex! You get an extra roll!"; } }
  ];

  dexMilestones.forEach(m => {
    if (m.check() && !player.rewards[m.key]) {
      notifications.push(m.action());
      player.rewards[m.key] = true;
    }
  });

  // Show notifications
  notifications.forEach(msg => {
    const notif = document.createElement("div");
    notif.className = "reward-notification";
    notif.textContent = msg;
    document.body.appendChild(notif);

    // Fade out after 3 seconds
    setTimeout(() => notif.remove(), 3000);
  });

  // Update UI
  save();
}

// Update UI
function updateUI(){
  document.getElementById("playerInfo").textContent = "Trainer: "+player.username;
  document.getElementById("rolls").textContent = player.totalRolls;
  document.getElementById("best").textContent = player.bestPull||"None";
  renderDex(dexSearch.value);
}

// Roll
function rollRarity(){
  let r=Math.random()*100, sum=0;
  for(const x of rarityTable){ sum+=x.chance; if(r<=sum) return x; }
  return rarityTable[0];
}

rollBtn.onclick=()=>{
  const r=rollRarity();
  const p=r.pool[Math.floor(Math.random()*r.pool.length)];
  const isShiny = Math.random() < 0.001;
  player.totalRolls++;
 const base = megaMap[p] || p;

if(!player.pokedex[base]){
  player.pokedex[base] = { normal:0, shiny:0, mega:{} };
}

if(megaMap[p]){
  player.pokedex[base].mega[p] = true;
} else {
  if(isShiny) player.pokedex[base].shiny++;
  else player.pokedex[base].normal++;
}

  if(r.rank>player.bestRank){ player.bestRank=r.rank; player.bestPull = p+(isShiny?" (Shiny)":"")+" ("+r.name+")"; }

  const card = document.getElementById("result");
  card.className = "card "+r.class;
  card.style.animation="POP 0.5s ease";
  card.innerHTML=`<div>${p}${isShiny?" ★":""}</div><small>${r.name}</small>`;

  const rollsThisClick = player.rollMultiplier;

  for (let i = 0; i < rollsThisClick; i++) {
    doSingleRoll();
  }

  save();
  updateUI();
  checkRewards();
};

function doSingleRoll() {
  const r = rollRarity();
  const p = r.pool[Math.floor(Math.random() * r.pool.length)];

  const isShiny = Math.random() < 0.001;

  player.totalRolls++;

  const base = megaMap[p] || p;
  if (!player.pokedex[base]) {
    player.pokedex[base] = { normal: 0, shiny: 0, mega: {} };
  }

  if (megaMap[p]) {
    player.pokedex[base].mega[p] = true;
  } else if (isShiny) {
    player.pokedex[base].shiny++;
  } else {
    player.pokedex[base].normal++;
  }

  if (r.rank > player.bestRank) {
    player.bestRank = r.rank;
    player.bestPull = `${p}${isShiny ? " ★" : ""} (${r.name})`;
  }
