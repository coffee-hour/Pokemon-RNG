<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: Arial, sans-serif;
  padding: 20px;
  display: flex;
}

#pokedexSidebar {
  width: 260px;
  margin-right: 20px;
}

#dexSearch {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}

#pokedex {
  max-height: 80vh;
  overflow-y: auto;
  background: #0f1233;
  border-radius: 10px;
  padding: 10px;
}

.dex {
  font-size: 13px;
  padding: 4px;
  opacity: .3;
}
.dex.collected { opacity: 1; }

.common { color:#b0bec5 }
.rare { color:#42a5f5 }
.ultra { color:#ab47bc }
.ultra-beast { color:#ff6f00 }
.legendary { color:#ff5252 }
.mythical { color: gold }
.paradox { color:#00e5ff }

#main { flex: 1; text-align: center; }

.card {
  margin: 20px auto;
  width: 280px;
  height: 180px;
  background: #000;
  border-radius: 15px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  font-size:20px;
  animation: pop .4s;
}

@keyframes pop {
  0%{transform:scale(.8);opacity:0}
  100%{transform:scale(1);opacity:1}
}

.mega {
  color: red;
  text-shadow: 0 0 6px red;
}
.shiny {
  color: red;
  font-weight: bold;
  text-shadow: 0 0 6px red;
}</style>
  
</head>

<body>

<div id="pokedexSidebar">
  <input id="dexSearch" placeholder="Search Pokédex">
  <div id="pokedex"></div>
</div>

<div id="main">
  <h1>🎲 Pokémon RNG</h1>
  <input id="name" placeholder="Trainer name">
  <br><br>
  <button id="start">Start</button>
  <button id="roll">Roll Pokémon</button>

  <div id="result" class="card">Ready</div>
  <p>Rolls: <span id="rolls">0</span></p>
</div>

<script>
const MEGAS = new Set([
  "venusaur","charizard","blastoise","alakazam","gengar","kangaskhan",
  "pinsir","gyarados","aerodactyl","mewtwo","ampharos","steelix",
  "scizor","heracross","houndoom","tyranitar","blaziken","gardevoir",
  "mawile","aggron","medicham","manectric","banette","absol",
  "latias","latios","garchomp","lucario","abomasnow","beedrill",
  "pidgeot","slowbro","sceptile","swampert","sableye","sharpedo",
  "camerupt","altaria","glalie","salamence","metagross","rayquaza",
  "lopunny","gallade","audino","diancie"
]);

const RARITY = {
  mythical: new Set(["mew","celebi","jirachi","deoxys","victini","genesect","diancie","hoopa","volcanion","zeraora","meltan","melmetal","zarude"]),
  legendary: new Set(),
  "ultra-beast": new Set(["nihilego","buzzwole","pheromosa","xurkitree","celesteela","kartana","guzzlord","poipole","naganadel","stakataka","blacephalon"]),
  paradox: new Set()
};

let allPokemon = [];
let player = { rolls:0, dex:{} };

async function loadPokemon(){
  const res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=1025");
  const data = await res.json();
  allPokemon = data.results.map(p => p.name);
  renderDex();
}

function getRarity(name){
  if(RARITY.mythical.has(name)) return "mythical";
  if(RARITY["ultra-beast"].has(name)) return "ultra-beast";
  if(RARITY.legendary.has(name)) return "legendary";
  if(RARITY.paradox.has(name)) return "paradox";
  return Math.random()<.75?"common":"rare";
}

function roll(){
  const name = allPokemon[Math.floor(Math.random()*allPokemon.length)];
  const shiny = Math.random()<0.001;
  const mega = MEGAS.has(name) && Math.random()<0.05;
  const rarity = getRarity(name);

  player.rolls++;
  player.dex[name] = true;

  const text =
   (shiny ? ' <span class="shiny"> ★</span>' : '');
    name +
    (mega ? ' <span class="mega"> ⛀</span>' : '');

  document.getElementById("result").className = "card "+rarity;
  document.getElementById("result").innerHTML =
    `<div>${text}</div><small>${rarity}</small>`;
  document.getElementById("rolls").textContent = player.rolls;

  renderDex();
  localStorage.setItem("rngSave", JSON.stringify(player));
}

function renderDex(){
  const q = dexSearch.value.toLowerCase();
  pokedex.innerHTML="";
  allPokemon.forEach(p=>{
    if(q && !p.includes(q)) return;
    const d=document.createElement("div");
    d.className="dex "+getRarity(p)+(player.dex[p]?" collected":"");
    d.textContent=p;
    pokedex.appendChild(d);
  });
}

document.getElementById("roll").onclick=roll;
document.getElementById("start").onclick=()=>loadPokemon();
dexSearch.oninput=renderDex;

const save = localStorage.getItem("rngSave");
if(save){ player=JSON.parse(save); loadPokemon(); }
</script>
</body>
</html>
