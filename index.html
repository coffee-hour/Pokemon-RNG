<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#1b1f4b,#0a0c1a);
  color:#fff;
  font-family:Arial,sans-serif;
  display:flex;
  padding:20px;
}

/* Sidebar */
#pokedexSidebar{
  width:260px;
  margin-right:20px;
  display:flex;
  flex-direction:column;
}
#dexSearch{
  padding:8px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}
#pokedex{
  background:#0f1233;
  border:2px solid #444;
  border-radius:10px;
  padding:10px;
  max-height:80vh;
  overflow-y:auto;
}

/* Dex entries */
.dex-entry{
  padding:5px 8px;
  margin:3px 0;
  border-radius:6px;
  font-size:13px;
  opacity:.35;
}
.dex-entry.collected{opacity:1}

/* Rarity colors */
.common{background:#b0bec5;color:#000}
.uncommon{background:#66bb6a;color:#000}
.rare{background:#42a5f5}
.ultra{background:#ab47bc}
.mythical{background:linear-gradient(45deg,gold,orange);color:#000;font-weight:bold}

/* Main */
#main{
  flex:1;
  text-align:center;
}

button,input{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
}
button{
  background:#ff4757;
  color:#fff;
  cursor:pointer;
}

/* Card */
.card{
  width:260px;
  height:160px;
  margin:20px auto;
  background:#000;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  animation:pop .4s ease;
}
@keyframes pop{
  from{transform:scale(.8);opacity:0}
  to{transform:scale(1);opacity:1}
}
.card.common{color:#aaa}
.card.uncommon{color:#2ecc71}
.card.rare{color:#3498db}
.card.ultra{color:#9b59b6}
.card.mythical{color:gold}
</style>
</head>

<body>

<div id="pokedexSidebar">
  <input id="dexSearch" placeholder="Search Pokémon">
  <div id="pokedex"></div>
</div>

<div id="main">
  <h1>🎲 Pokémon RNG</h1>

  <div id="login">
    <input id="username" placeholder="Trainer name">
    <br>
    <button id="start">Start</button>
  </div>

  <div id="game" style="display:none">
    <p id="trainer"></p>
    <button id="roll">Roll Pokémon</button>
    <div id="card" class="card common">Roll to begin</div>
    <p>Rolls: <span id="rolls">0</span></p>
    <p>Best: <span id="best">None</span></p>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

/* ===== DATA ===== */
const dexOrder=[ "Bulbasaur","Ivysaur","Venusaur","Charmander","Charmeleon","Charizard","Squirtle","Wartortle","Blastoise","Caterpie","Metapod","Butterfree","Weedle","Kakuna","Beedrill","Pidgey","Pidgeotto","Pidgeot","Rattata","Raticate","Spearow","Fearow","Ekans","Arbok","Sandshrew","Sandslash","Nidoran-F","Nidorina","Nidoqueen","Nidoran-M","Nidorino","Nidoking","Clefairy","Clefable","Vulpix","Ninetales","Jigglypuff","Wigglytuff","Zubat","Golbat","Oddish","Gloom","Vileplume","Paras","Parasect","Venonat","Venomoth","Diglett","Dugtrio","Meowth","Persian","Psyduck","Golduck","Mankey","Primeape","Growlithe","Arcanine","Poliwag","Poliwhirl","Poliwrath","Abra","Kadabra","Alakazam","Machop","Machoke","Machamp","Bellsprout","Weepinbell","Victreebel","Tentacool","Tentacruel","Geodude","Graveler","Golem","Ponyta","Rapidash","Slowpoke","Slowbro","Magnemite","Magneton","Farfetchd","Doduo","Dodrio","Seel","Dewgong","Grimer","Muk","Shellder","Cloyster","Gastly","Haunter","Gengar","Onix","Drowzee","Hypno","Krabby","Kingler","Voltorb","Electrode","Exeggcute","Exeggutor","Cubone","Marowak","Hitmonlee","Hitmonchan","Lickitung","Koffing","Weezing","Rhyhorn","Rhydon","Chansey","Tangela","Kangaskhan","Horsea","Seadra","Goldeen","Seaking","Staryu","Starmie","MrMime","Scyther","Jynx","Electabuzz","Magmar","Pinsir","Tauros","Magikarp","Gyarados","Lapras","Ditto","Eevee","Vaporeon","Jolteon","Flareon","Porygon","Omanyte","Omastar","Kabuto","Kabutops","Aerodactyl","Snorlax","Articuno","Zapdos","Moltres","Dratini","Dragonair","Dragonite","Mewtwo","Mew" ];

const megaSet=new Set(["Venusaur","Charizard","Blastoise","Beedrill","Pidgeot","Alakazam","Slowbro","Gengar","Kangaskhan","Pinsir","Gyarados","Aerodactyl","Mewtwo"]);

const rarities=[
 {name:"Common",class:"common",chance:65,pool:dexOrder.slice(0,60)},
 {name:"Uncommon",class:"uncommon",chance:20,pool:dexOrder.slice(60,100)},
 {name:"Rare",class:"rare",chance:10,pool:dexOrder.slice(100,130)},
 {name:"Ultra",class:"ultra",chance:3,pool:["Aerodactyl","Snorlax","Dragonite"]},
 {name:"Mythical",class:"mythical",chance:2,pool:["Articuno","Zapdos","Moltres","Mewtwo","Mew"]}
];

const rarityMap={};
rarities.forEach(r=>r.pool.forEach(p=>rarityMap[p]=r.class));

let player={name:"",rolls:0,best:null,dex:{}};

/* ===== DOM ===== */
const pokedex=document.getElementById("pokedex");
const search=document.getElementById("dexSearch");

/* ===== FUNCTIONS ===== */
function save(){localStorage.setItem("rngSave",JSON.stringify(player))}
function load(){
 const d=localStorage.getItem("rngSave");
 if(d){player=JSON.parse(d);startGame()}
}

function rollRarity(){
 let r=Math.random()*100,sum=0;
 for(const t of rarities){sum+=t.chance;if(r<=sum)return t}
}

function renderDex(f=""){
 pokedex.innerHTML="";
 dexOrder.forEach((p,i)=>{
  if(f && !p.toLowerCase().includes(f.toLowerCase()))return;
  const e=document.createElement("div");
  e.className="dex-entry "+(rarityMap[p]||"");
  const d=player.dex[p];
  if(d){
   e.classList.add("collected");
   e.innerHTML=`${String(i+1).padStart(3,"0")} — ${p}
    ${megaSet.has(p)?(d.mega?" <span style='color:red'>⛂</span>":" ⛀"):""}
    ${d.shiny?" ★":" ☆"}`;
  }else{
   e.textContent=`${String(i+1).padStart(3,"0")} — ????`;
  }
  pokedex.appendChild(e);
 });
}

function startGame(){
 document.getElementById("login").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("trainer").textContent="Trainer: "+player.name;
 document.getElementById("rolls").textContent=player.rolls;
 document.getElementById("best").textContent=player.best||"None";
 renderDex(search.value);
}

/* ===== EVENTS ===== */
document.getElementById("start").onclick=()=>{
 const n=document.getElementById("username").value.trim();
 if(!n)return alert("Enter name");
 player={name:n,rolls:0,best:null,dex:{}};
 save();startGame();
};

document.getElementById("roll").onclick=()=>{
 const r=rollRarity();
 const p=r.pool[Math.floor(Math.random()*r.pool.length)];
 const shiny=Math.random()<0.01;
 const mega=megaSet.has(p)&&Math.random()<0.005;

 player.rolls++;
 if(!player.dex[p])player.dex[p]={shiny:false,mega:false};
 if(shiny)player.dex[p].shiny=true;
 if(mega)player.dex[p].mega=true;

 player.best=`${p}${mega?" ⛂":""}${shiny?" ★":""} (${r.name})`;

 const card=document.getElementById("card");
 card.className="card "+r.class;
 card.innerHTML=`<div>${p}${mega?" <span style='color:red'>⛂</span>":""}${shiny?" ★":""}</div><small>${r.name}</small>`;

 save();startGame();
};

search.oninput=e=>renderDex(e.target.value);

load();
});
</script>
</body>
</html>
