<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    background: #0f1220;
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
}
h1 { margin-bottom: 10px; }
button {
    background: #ff4757;
    border: none;
    color: white;
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}
button:hover { background: #ff6b81; }
.card {
    margin: 20px auto;
    padding: 20px;
    max-width: 320px;
    border-radius: 15px;
    background: #1c1f3a;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    transition: transform 0.3s ease;
}
.card.shiny { box-shadow: 0 0 30px gold; }
.rarity-common { color: #aaa; }
.rarity-uncommon { color: #2ecc71; }
.rarity-rare { color: #3498db; }
.rarity-ultra { color: #9b59b6; }
.rarity-mythical { color: #f1c40f; }
.stats { margin-top: 20px; font-size: 14px; }
.history { margin-top: 20px; font-size: 13px; opacity: 0.8; }
form { margin: 10px auto; max-width: 300px; }
input { margin: 5px 0; padding: 8px; width: 100%; border-radius: 5px; border: none; }
</style>
</head>
<body>

<h1>🎲 Pokémon RNG Challenge</h1>

<div id="authForms">
    <h3>Sign Up</h3>
    <form id="signupForm">
        <input type="text" placeholder="Username" id="signupUsername" required />
        <input type="email" placeholder="Email" id="signupEmail" required />
        <input type="password" placeholder="Password" id="signupPassword" required />
        <button type="submit">Sign Up</button>
    </form>

    <h3>Login</h3>
    <form id="loginForm">
        <input type="email" placeholder="Email" id="loginEmail" required />
        <input type="password" placeholder="Password" id="loginPassword" required />
        <button type="submit">Login</button>
    </form>
</div>

<div id="game" style="display:none;">
    <p id="playerInfo"></p>
    <button onclick="rollPokemon()">🎲 Roll Pokémon</button>

    <div id="result" class="card"><p>Press Roll to begin!</p></div>

    <div class="stats">
        <p>Total Rolls: <span id="totalRolls">0</span></p>
        <p>Shinies Found: <span id="shinyCount">0</span></p>
        <p>Best Pull: <span id="bestPull">None</span></p>
    </div>

    <div class="history">
        <p>Last Rolls:</p>
        <div id="history"></div>
    </div>
</div>

<script>
// ---------- SUPABASE SETUP ----------
const SUPABASE_URL = 'https://mlkhgrkayqwqlvzagvjq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2hncmtheXF3cWx2emFndmpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNDE3MDEsImV4cCI6MjA4MzkxNzcwMX0.YzCjC52nhY829bxDeAoipdXq-6Heu7sPtbKmg1mpV1s';
const supabase = Supabase.createClient(https://mlkhgrkayqwqlvzagvjq.supabase.co, eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2hncmtheXF3cWx2emFndmpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNDE3MDEsImV4cCI6MjA4MzkxNzcwMX0.YzCjC52nhY829bxDeAoipdXq-6Heu7sPtbKmg1mpV1s);

let user = null;
let playerData = null;

// ---------- DATA ----------
const rarityTable = [
    { name: "Common", chance: 70, rank: 1, class: "rarity-common", pool: ["Pidgey","Rattata","Caterpie"] },
    { name: "Uncommon", chance: 20, rank: 2, class: "rarity-uncommon", pool: ["Growlithe","Machop","Abra"] },
    { name: "Rare", chance: 8, rank: 3, class: "rarity-rare", pool: ["Gible","Riolu","Larvitar"] },
    { name: "Ultra Rare", chance: 1.8, rank: 4, class: "rarity-ultra", pool: ["Dragonite","Metagross"] },
    { name: "Mythical", chance: 0.2, rank: 5, class: "rarity-mythical", pool: ["Mew","Celebi"] }
];
const SHINY_RATE = 4096;

// ---------- AUTH ----------
async function signUp(e){
    e.preventDefault();
    const username = document.getElementById('signupUsername').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    if(!username || !email || !password){ alert("Fill in all fields"); return; }

    const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
    if(signUpError){ alert(signUpError.message); return; }

    user = signUpData.user;

    // Create player row
    const { error: dbError } = await supabase.from('players').upsert({
        id: user.id,
        username,
        total_rolls: 0,
        shiny_count: 0,
        best_pull: null,
        best_pull_rank: 0
    });
    if(dbError){ alert("Failed to create player row: " + dbError.message); return; }

    alert("Signup successful! You can now login.");
    document.getElementById('signupForm').reset();
}

async function login(e){
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if(error){ alert(error.message); return; }

    user = data.user;
    // Load player
    const { data: player, error: playerError } = await supabase.from('players').select('*').eq('id', user.id).single();
    if(playerError){ alert("Failed to load player data: " + playerError.message); return; }

    playerData = player;
    document.getElementById('authForms').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('playerInfo').textContent = `Logged in as ${playerData.username}`;
    updateStats();
}

// ---------- RNG GAME ----------
function rollRarity(){
    let roll = Math.random()*100;
    let cumulative=0;
    for(let r of rarityTable){ cumulative+=r.chance; if(roll<=cumulative) return r; }
    return rarityTable[0];
}

async function rollPokemon(){
    const rarity = rollRarity();
    const pokemon = rarity.pool[Math.floor(Math.random()*rarity.pool.length)];
    const isShiny = Math.floor(Math.random()*SHINY_RATE)===0;

    playerData.total_rolls++;
    if(isShiny) playerData.shiny_count++;
    if(rarity.rank > playerData.best_pull_rank){
        playerData.best_pull = `${pokemon} (${rarity.name})`;
        playerData.best_pull_rank = rarity.rank;
    }

    if(!playerData.history) playerData.history = [];
    playerData.history.unshift(`${isShiny ? "✨ " : ""}${pokemon} (${rarity.name})`);
    playerData.history = playerData.history.slice(0,5);

    displayResult(pokemon, rarity, isShiny);
    updateStats();

    // Save to Supabase
    await supabase.from('players').update({
        total_rolls: playerData.total_rolls,
        shiny_count: playerData.shiny_count,
        best_pull: playerData.best_pull,
        best_pull_rank: playerData.best_pull_rank
    }).eq('id', playerData.id);
}

// ---------- DISPLAY ----------
function displayResult(name, rarity, shiny){
    const card = document.getElementById('result');
    card.className = `card ${shiny?'shiny':''}`;
    card.innerHTML = `<h2>${shiny?'✨ Shiny ':''}${name}</h2><p class="${rarity.class}">${rarity.name}</p>`;
}

function updateStats(){
    document.getElementById('totalRolls').textContent = playerData.total_rolls;
    document.getElementById('shinyCount').textContent = playerData.shiny_count;
    document.getElementById('bestPull').textContent = playerData.best_pull ?? 'None';
    document.getElementById('history').innerHTML = (playerData.history||[]).map(r=>`<div>${r}</div>`).join('');
}

// ---------- EVENTS ----------
document.getElementById('signupForm').addEventListener('submit', signUp);
document.getElementById('loginForm').addEventListener('submit', login);

// ---------- SESSION CHECK ----------
supabase.auth.getSession().then(({ data: { session } })=>{
    if(session){
        user = session.user;
        loginExistingUser();
    }
});

async function loginExistingUser(){
    const { data: player, error } = await supabase.from('players').select('*').eq('id', user.id).single();
    if(error) return;
    playerData = player;
    document.getElementById('authForms').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('playerInfo').textContent = `Logged in as ${playerData.username}`;
    updateStats();
}
</script>
</body>
</html>
