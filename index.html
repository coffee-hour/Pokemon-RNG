<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG – Rarity Layer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0a0c1a;
  color:#fff;
  font-family:Arial, sans-serif;
  text-align:center;
  padding:30px;
}

button, input {
  padding:12px;
  margin:10px;
  font-size:16px;
}

#game { display:none; }

.card {
  margin:20px auto;
  padding:20px;
  width:260px;
  border:2px solid #444;
}

.card.common { color:#aaa; }
.card.uncommon { color:#2ecc71; }
.card.rare { color:#3498db; }
.card.ultra { color:#9b59b6; }
.card.mythical { color:gold; }
</style>
</head>

<body>

<h1>Pokémon RNG – Rarity</h1>

<div id="login">
  <input id="usernameInput" placeholder="Username">
  <br>
  <button id="startBtn">Start Game</button>
</div>

<div id="game">
  <p id="playerInfo"></p>
  <button id="rollBtn">Roll Pokémon</button>
  <div id="result" class="card">Roll to begin</div>
  <p>Total Rolls: <span id="rolls">0</span></p>
  <p>Best Pull: <span id="best">None</span></p>
</div>

<script>
// ---------- RARITY TABLE ----------
const rarityTable = [
  { name:"Common", class:"common", chance:70, pool:["Pidgey","Rattata","Caterpie","Weedle","Zubat"] },
  { name:"Uncommon", class:"uncommon", chance:20, pool:["Pidgeotto","Raticate","Metapod","Kakuna","Golbat"] },
  { name:"Rare", class:"rare", chance:8, pool:["Pidgeot","Rhydon","Beedrill","Fearow","Arcanine"] },
  { name:"Ultra", class:"ultra", chance:1.8, pool:["Dragonite","Gyarados","Snorlax","Lapras"] },
  { name:"Mythical", class:"mythical", chance:0.2, pool:["Mew","Articuno","Zapdos","Moltres","Mewtwo"] }
];

// ---------- PLAYER DATA ----------
let player = {
  username:"",
  rolls:0,
  bestRank:0,
  bestPull:null
};

// ---------- LOCAL STORAGE ----------
function save() {
  localStorage.setItem("rngSave", JSON.stringify(player));
}

function load() {
  const data = localStorage.getItem("rngSave");
  if(data){
    player = JSON.parse(data);
    login.style.display="none";
    game.style.display="block";
    updateUI();
  }
}

function updateUI(){
  playerInfo.textContent = "Trainer: " + player.username;
  rolls.textContent = player.rolls;
  best.textContent = player.bestPull ?? "None";
}

// ---------- START BUTTON ----------
startBtn.onclick = () => {
  const name = usernameInput.value.trim();
  if(!name) return alert("Enter a username");
  player.username = name;
  player.rolls = 0;
  player.bestRank = 0;
  player.bestPull = null;
  login.style.display="none";
  game.style.display="block";
  updateUI();
  save();
};

// ---------- ROLL LOGIC ----------
function rollRarity(){
  let r = Math.random()*100, c=0;
  for(const rarity of rarityTable){
    c += rarity.chance;
    if(r <= c) return rarity;
  }
  return rarityTable[0];
}

rollBtn.onclick = () => {
  const rarity = rollRarity();
  const poke = rarity.pool[Math.floor(Math.random()*rarity.pool.length)];

  player.rolls++;

  // Update best pull
  const rank = rarityTable.indexOf(rarity)+1;
  if(rank > player.bestRank){
    player.bestRank = rank;
    player.bestPull = `${poke} (${rarity.name})`;
  }

  // Show result with color
  result.textContent = poke;
  result.className = `card ${rarity.class}`;

  updateUI();
  save();
};

load();
</script>

</body>
</html>
