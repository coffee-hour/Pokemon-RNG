<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pokémon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background:#0a0c1a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}
input,button {
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
}
button {
  background:#ff4757;
  color:white;
  cursor:pointer;
}
#game { display:none; }
.card {
  margin:20px auto;
  padding:20px;
  width:220px;
  border-radius:12px;
  background:#1b1f4b;
}
</style>
</head>

<body>

<h1>Pokémon RNG</h1>

<div id="login">
  <input id="username" placeholder="Username">
  <br><br>
  <button id="start">Start Game</button>
</div>

<div id="game">
  <h3 id="playerName"></h3>
  <button id="roll">Roll</button>
  <div class="card" id="card">—</div>
  <p>Rolls: <span id="rolls">0</span></p>
  <p>Best: <span id="best">None</span></p>
</div>

<script>
/* ---------- SUPABASE ---------- */
const supabase = Supabase.createClient(
  "https://mlkhgrkayqwqlvzagvjq.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bnh4cm9mb3p4cW10d29tZWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNDEwOTYsImV4cCI6MjA4MzkxNzA5Nn0.sHSzVg4Nj9j7-dkdtsDj7Smg_cArweYBKGHfSioEZUY"
);

/* ---------- STATE ---------- */
let player = null;

/* ---------- START GAME ---------- */
document.getElementById("start").onclick = async () => {
  const name = document.getElementById("username").value.trim();
  if (!name) { alert("Username required"); return; }

  // load existing
  let { data, error } = await supabase
    .from("players")
    .select("*")
    .eq("username", name)
    .single();

  // create if missing
  if (!data) {
    const res = await supabase
      .from("players")
      .insert({ username: name })
      .select()
      .single();

    if (res.error) {
      alert("DB error: " + res.error.message);
      return;
    }
    data = res.data;
  }

  player = data;

  document.getElementById("login").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("playerName").textContent = "Trainer: " + name;
  render();
};

/* ---------- ROLL ---------- */
document.getElementById("roll").onclick = async () => {
  if (!player) return;

  const pulls = ["Pidgey","Eevee","Gengar","Mew"];
  const pull = pulls[Math.floor(Math.random()*pulls.length)];

  player.total_rolls++;
  if (pull === "Mew") player.best_pull = "Mew";

  document.getElementById("card").textContent = pull;

  await supabase
    .from("players")
    .update({
      total_rolls: player.total_rolls,
      best_pull: player.best_pull
    })
    .eq("username", player.username);

  render();
};

/* ---------- UI ---------- */
function render() {
  document.getElementById("rolls").textContent = player.total_rolls;
  document.getElementById("best").textContent = player.best_pull;
}
</script>

</body>
</html>
