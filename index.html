<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG – Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0a0c1a;
  color:#fff;
  font-family:Arial, sans-serif;
  text-align:center;
  padding:30px;
}

button, input {
  padding:12px;
  margin:10px;
  font-size:16px;
}

#game { display:none; }

.card {
  margin:20px auto;
  padding:20px;
  width:260px;
  border:2px solid #444;
}
</style>
</head>

<body>

<h1>Pokémon RNG (Stable)</h1>

<div id="login">
  <input id="usernameInput" placeholder="Username">
  <br>
  <button id="startBtn">Start Game</button>
</div>

<div id="game">
  <p id="playerInfo"></p>
  <button id="rollBtn">Roll Pokémon</button>
  <div id="result" class="card">Roll to begin</div>
  <p>Total Rolls: <span id="rolls">0</span></p>
</div>

<script>
const rarityPool = [
  "Pidgey","Rattata","Caterpie","Weedle","Zubat",
  "Pikachu","Eevee","Snorlax","Dragonite","Mew"
];

let player = {
  username:"",
  rolls:0
};

function save() {
  localStorage.setItem("rngSave", JSON.stringify(player));
}

function load() {
  const data = localStorage.getItem("rngSave");
  if(data){
    player = JSON.parse(data);
    login.style.display="none";
    game.style.display="block";
    updateUI();
  }
}

function updateUI(){
  playerInfo.textContent = "Trainer: " + player.username;
  rolls.textContent = player.rolls;
}

startBtn.onclick = () => {
  const name = usernameInput.value.trim();
  if(!name) return alert("Enter a username");
  player.username = name;
  player.rolls = 0;
  save();
  login.style.display="none";
  game.style.display="block";
  updateUI();
};

rollBtn.onclick = () => {
  const poke = rarityPool[Math.floor(Math.random()*rarityPool.length)];
  player.rolls++;
  result.textContent = poke;
  updateUI();
  save();
};

load();
</script>

</body>
</html>
