<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: 'Trebuchet MS', Arial, sans-serif;
  text-align: center;
  padding: 30px;
  overflow-x: hidden;
}

h1 { letter-spacing: 2px; text-shadow: 0 0 15px rgba(255,255,255,0.3); }

input, button {
  padding: 12px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

button {
  background: linear-gradient(145deg, #ff4757, #ff6b81);
  color: white;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(255,71,87,0.4);
  transition: transform 0.2s;
}

button:hover { transform: scale(1.05); }

#game { margin-top: 25px; }

.card {
  margin: 25px auto;
  width: 260px;
  height: 180px;
  border-radius: 18px;
  background: linear-gradient(145deg, #22265c, #14183a);
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  animation: flipIn 0.6s ease;
}

.card small { font-size: 14px; opacity: 0.8; }

.card.common { color: #aaa; }
.card.uncommon { color: #2ecc71; }
.card.rare { color: #3498db; }
.card.ultra { color: #9b59b6; box-shadow: 0 0 35px #9b59b6; }
.card.mythical { color: gold; box-shadow: 0 0 50px gold; animation: pulse 1s infinite; }
.card.spoiler { color: teal; box-shadow: 0 0 65px teal; animation: pulse 2s infinite; }

@keyframes flipIn {
  from { transform: rotateY(90deg) scale(0.8); opacity:0; }
  to { transform: rotateY(0deg) scale(1); opacity:1; }
}
@keyframes pulse {
  0%{box-shadow:0 0 25px gold;}
  50%{box-shadow:0 0 55px gold;}
  100%{box-shadow:0 0 25px gold;}
}

.stats { font-size: 14px; opacity: 0.9; }

#pokedex {
  display: none;
  max-height: 220px;
  overflow-y: auto;
  margin-top: 10px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(0,0,0,0.3);
  font-size: 14px;
}

#pokedex div {
  display: flex;
  justify-content: space-between;
  padding: 4px 6px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<h1>🎲 Pokémon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Enter username">
  <br>
  <button id="startBtn">Start Game</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>

  <button id="rollBtn">🎲 Roll Pokémon</button>

  <div id="result" class="card common">
    Roll to begin!
  </div>

  <div class="stats">
    <p>Total Rolls: <span id="rolls">0</span></p>
    <p>Best Pull: <span id="best">None</span></p>
    <p>Unique Pokémon: <span id="uniqueCount">0</span></p>
    <button id="toggleDex">📘 View Pokédex</button>
    <div id="pokedex"></div>
  </div>
</div>

<script>
const rarityTable = [
  { name:"Common", class:"common", chance:70, pool:["Pidgey","Rattata","Caterpie","Weedle","Spearow","Ekans","Sandshrew","Nidoran♀","Nidoran♂","Zubat","Oddish","Paras","Venonat","Diglett","Meowth","Psyduck","Mankey","Poliwag","Bellsprout","Geodude"] },
  { name:"Uncommon", class:"uncommon", chance:20, pool:["Pidgeotto","Raticate","Metapod","Kakuna","Fearow","Arbok","Sandslash","Nidorina","Nidorino","Golbat","Gloom","Parasect","Venomoth","Dugtrio","Persian","Golduck","Primeape","Poliwhirl","Weepinbell","Graveler"] },
  { name:"Rare", class:"rare", chance:8, pool:["Pidgeot","Rhydon","Beedrill","Fearow","Arcanine","Nidoking","Nidoqueen","Venusaur","Charmeleon","Wartortle","Raichu","Machoke","Machamp","Golem","Rapidash","Poliwrath","Kadabra","Alakazam","Hitmonlee","Hitmonchan"] },
  { name:"Ultra", class:"ultra", chance:1.8, pool:["Dragonite","Gyarados","Snorlax","Lapras"] },
  { name:"Mythical", class:"mythical", chance:0.15, pool:["Mew","Articuno","Zapdos","Moltres","Mewtwo"] },
  { name:"Spoiler", class:"spoiler", chance:0.05, pool:["Celebi","Ho-Oh","Raikou","Entei","Suicune","Lugia"] }
];

let player = {
  username:"",
  totalRolls:0,
  bestRank:0,
  bestPull:null,
  pokedex:{} // Pokémon name → count
};

function savePlayer(){
  localStorage.setItem("pokemonRNGPlayer", JSON.stringify(player));
}

function loadPlayer(){
  const saved = localStorage.getItem("pokemonRNGPlayer");
  if(saved){
    player = JSON.parse(saved);
    login.style.display="none";
    game.style.display="block";
    updateUI();
  }
}

function updateUI(){
  playerInfo.textContent = `Trainer: ${player.username}`;
  rolls.textContent = player.totalRolls;
  best.textContent = player.bestPull ?? "None";
  uniqueCount.textContent = Object.keys(player.pokedex).length;
  renderDex();
}

function renderDex(){
  pokedex.innerHTML = "";
  Object.entries(player.pokedex)
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .forEach(([name,count])=>{
      const row = document.createElement("div");
      row.innerHTML = `<span>${name}</span><span>x${count}</span>`;
      pokedex.appendChild(row);
    });
}

startBtn.onclick = () => {
  const name = usernameInput.value.trim();
  if(!name) return alert("Enter a username!");
  player = { username:name, totalRolls:0, bestRank:0, bestPull:null, pokedex:{} };
  login.style.display="none";
  game.style.display="block";
  updateUI();
  savePlayer();
};

function rollRarity(){
  let r=Math.random()*100,c=0;
  for(const x of rarityTable){ c+=x.chance; if(r<=c) return x; }
}

rollBtn.onclick = () => {
  const rarity = rollRarity();
  const pokemon = rarity.pool[Math.floor(Math.random()*rarity.pool.length)];

  player.totalRolls++;
  player.pokedex[pokemon] = (player.pokedex[pokemon]||0)+1;

  const rank = rarityTable.indexOf(rarity)+1;
  if(rank > player.bestRank){
    player.bestRank = rank;
    player.bestPull = `${pokemon} (${rarity.name})`;
  }

  result.className = `card ${rarity.class}`;
  result.innerHTML = `<div>${pokemon}</div><small>${rarity.name}</small>`;

  updateUI();
  savePlayer();
};

toggleDex.onclick = () => {
  pokedex.style.display = pokedex.style.display==="none" ? "block" : "none";
};

loadPlayer();
</script>

</body>
</html>
