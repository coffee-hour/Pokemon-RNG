<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: 'Trebuchet MS', Arial, sans-serif;
  text-align: center;
  padding: 30px;
}
button, input {
  padding: 12px;
  margin: 10px;
  border-radius: 12px;
  border: none;
}
button {
  background: #ff4757;
  color: white;
  cursor: pointer;
}
#game { display: none; }
</style>
</head>

<body>

<h1>🎲 Pokémon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Enter username">
  <br>
  <button id="startBtn">Start Game</button>
</div>

<div id="game">
  <p id="playerInfo"></p>
  <button id="rollBtn">Roll</button>
  <p>Total Rolls: <span id="rolls">0</span></p>
</div>

<!-- ✅ CORRECT SUPABASE BROWSER BUILD -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
/* ---------- SUPABASE INIT (THIS WAS YOUR BUG) ---------- */
const supabase = supabaseJs.createClient(
  "https://yunxxrofozxqmtwomegk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1bnh4cm9mb3p4cW10d29tZWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNDEwOTYsImV4cCI6MjA4MzkxNzA5Nn0.sHSzVg4Nj9j7-dkdtsDj7Smg_cArweYBKGHfSioEZUY"
);

/* ---------- STATE ---------- */
let player = {
  username: "",
  total_rolls: 0
};

/* ---------- ELEMENTS ---------- */
const startBtn = document.getElementById("startBtn");
const rollBtn = document.getElementById("rollBtn");
const login = document.getElementById("login");
const game = document.getElementById("game");
const rolls = document.getElementById("rolls");
const playerInfo = document.getElementById("playerInfo");

/* ---------- START GAME ---------- */
startBtn.addEventListener("click", async () => {
  const name = usernameInput.value.trim();
  if (!name) return alert("Enter a username");

  player.username = name;

  // 🔐 Create or load player row
  const { data } = await supabase
    .from("players")
    .select("*")
    .eq("username", name)
    .single();

  if (data) {
    player.total_rolls = data.total_rolls;
  } else {
    await supabase.from("players").insert(player);
  }

  rolls.textContent = player.total_rolls;
  playerInfo.textContent = "Trainer: " + name;

  login.style.display = "none";
  game.style.display = "block";
});

/* ---------- ROLL ---------- */
rollBtn.addEventListener("click", async () => {
  player.total_rolls++;
  rolls.textContent = player.total_rolls;

  await supabase
    .from("players")
    .update({ total_rolls: player.total_rolls })
    .eq("username", player.username);
});
</script>

</body>
</html>
