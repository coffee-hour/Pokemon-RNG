<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: Arial, sans-serif;
  padding: 30px;
  display: flex;
  flex-direction: row;
}

/* Main content on right */
#mainContent {
  flex: 1;
  text-align: center;
}

/* Pokédex sidebar on left */
#pokedexSidebar {
  width: 220px;
  margin-right: 20px;
  display: flex;
  flex-direction: column;
}

/* Search box */
#dexSearch {
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

/* Dropdown / scrollable Pokédex */
#pokedexDropdown {
  display: block;
  max-height: 600px;
  overflow-y: auto;
  border: 2px solid #444;
  border-radius: 10px;
  padding: 10px;
  background: #0f1233;
}

/* Dex entries */
.dex-entry {
  padding: 6px 10px;
  border-radius: 6px;
  margin: 4px;
  font-size: 14px;
  font-weight: 500;
  display: inline-block;
  opacity: 0.35;
}

.dex-entry.collected {
  opacity: 1;
}

/* Rarity colors */
.common { background:#b0bec5; color:#000; }
.uncommon { background:#66bb6a; color:#000; }
.rare { background:#42a5f5; color:#fff; }
.ultra { background:#ab47bc; color:#fff; }
.mythical { background: linear-gradient(45deg, gold, orange); color:#000; font-weight:700; }

/* Buttons */
button, input { padding: 10px; margin: 6px; border-radius: 10px; border: none; font-size: 14px; }
button { background: #ff4757; color: white; cursor: pointer; }

.card {
  margin: 20px auto;
  width: 250px;
  height: 160px;
  border-radius: 15px;
  background: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 20px;
  transition: transform 0.5s ease, color 0.5s ease;
  animation: POP 0.5s ease;
}

/* Card animation */
@keyframes POP {
  0% { transform: scale(0.8); opacity: 0; }
  50% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* Rarity text colors for card */
.card.common { color: #aaa; }
.card.uncommon { color: #2ecc71; }
.card.rare { color: #3498db; }
.card.ultra { color: #9b59b6; }
.card.mythical { color: gold; }
.card.spoiler { color: teal; }
</style>
</head>

<body>

<div id="pokedexSidebar">
  <input id="dexSearch" placeholder="Search Pokémon...">
  <div id="pokedexDropdown" class="dex-grid"></div>
</div>

<div id="mainContent">
<h1>🎲 Pokemon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Username">
  <br>
  <button id="startBtn">Start</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>
  <button id="rollBtn">Roll Pokemon</button>
  <div id="result" class="card common">Roll to begin</div>
  <p>Rolls: <span id="rolls">0</span></p>
  <p>Best: <span id="best">None</span></p>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

// --- Rarities & Pools ---
const rarityTable = [
  { name:"Common", class:"common", chance:65, rank:1, pool:[
    "Bulbasaur","Charmander","Squirtle","Caterpie","Weedle","Pidgey","Rattata","Spearow",
    "Ekans","Sandshrew","Nidoran-F","Nidoran-M","Zubat","Oddish","Paras","Venonat",
    "Diglett","Meowth","Psyduck","Mankey","Poliwag","Bellsprout","Geodude","Magnemite",
    "Shellder","Krabby","Voltorb","Exeggcute","Koffing","Horsea","Goldeen","Magikarp",
    "Chikorita","Cyndaquil","Totodile","Sentret","Hoothoot","Ledyba","Spinarak","Chinchou",
    "Pichu","Cleffa","Igglybuff","Togepi","Natu","Mareep","Marill","Hoppip","Sunkern",
    "Wooper","Murkrow","Gligar","Snubbull","Swinub","Remoraid","Delibird","Phanpy","Tyrogue"
  ]},
  { name:"Uncommon", class:"uncommon", chance:20, rank:2, pool:[
    "Ivysaur","Charmeleon","Wartortle","Metapod","Kakuna","Pidgeotto","Raticate","Fearow",
    "Arbok","Sandslash","Nidorina","Nidorino","Golbat","Gloom","Parasect","Venomoth",
    "Dugtrio","Persian","Golduck","Primeape","Poliwhirl","Weepinbell","Graveler",
    "Magneton","Cloyster","Hypno","Kingler","Electrode","Exeggutor","Weezing",
    "Seadra","Seaking","Gyarados","Bayleef","Quilava","Croconaw","Furret","Noctowl",
    "Ledian","Ariados","Crobat","Lanturn","Togetic","Xatu","Flaaffy","Bellossom","Azumarill",
    "Sudowoodo","Politoed","Skiploom","Jumpluff","Aipom","Sunflora","Yanma","Quagsire",
    "Espeon","Umbreon","Slowking","Misdreavous","Unown","Wobbuffet","Girafarig",
    "Forretress","Dunsparce","Steelix","Granbull","Qwilfish","Scizor","Shuckle","Heracross",
    "Sneasel","Ursaring","Magcargo","Piloswine","Corsola","Octillery","Mantine","Skarmory",
    "Houndour","Kingdra","Porygon2","Stantler","Smeargle","Hitmontop","Smoochum","Elekid","Magby","Miltank"
  ]},
  { name:"Rare", class:"rare", chance:8, rank:3, pool:[
    "Venusaur","Charizard","Blastoise","Butterfree","Beedrill","Pidgeot","Pikachu","Raichu",
    "Nidoqueen","Nidoking","Clefable","Ninetales","Wigglytuff","Vileplume","Arcanine",
    "Poliwrath","Alakazam","Machamp","Golem","Rapidash","Slowbro","Dodrio","Dewgong",
    "Muk","Gengar","Marowak","Hitmonlee","Hitmonchan","Rhydon","Tangela","Kangaskhan",
    "Scyther","Jynx","Electabuzz","Magmar","Pinsir","Tauros","Lapras","Ditto",
    "Vaporeon","Jolteon","Flareon","Porygon","Omastar","Kabutops","Snorlax"
  ]},
  { name:"Ultra", class:"ultra", chance:1.5, rank:4, pool:[
    "Farfetchd","Chansey","MrMime","Aerodactyl","Dratini","Dragonair","Dragonite"
  ]},
  { name:"Mythical", class:"mythical", chance:0.2, rank:5, pool:[
    "Articuno","Zapdos","Moltres","Mewtwo","Mew","Lugia","Ho-Oh","Celebi"
  ]}
];

// Map rarity by Pokémon
const rarityMap = {};
rarityTable.forEach(tier => tier.pool.forEach(p => rarityMap[p] = tier.class));

// Full Dex order
const genAllOrder = [].concat(...rarityTable.map(t=>t.pool));

const pokedexDropdown = document.getElementById("pokedexDropdown");
const dexSearch = document.getElementById("dexSearch");

let player = {username:"",totalRolls:0,bestRank:0,bestPull:null,pokedex:{}};
const login = document.getElementById("login");
const game = document.getElementById("game");
const rollBtn = document.getElementById("rollBtn");
const startBtn = document.getElementById("startBtn");

// Save/load
function save(){ localStorage.setItem("pokemonRNG",JSON.stringify(player)); }
function load(){ 
  const data = localStorage.getItem("pokemonRNG"); 
  if(data){ player=JSON.parse(data); login.style.display="none"; game.style.display="block"; updateUI(); }
}

// Render Dex with shiny stars
function renderDex(filter=""){
  pokedexDropdown.innerHTML="";
  genAllOrder.forEach((p,index)=>{
    if(filter && !p.toLowerCase().includes(filter.toLowerCase())) return;

    const div = document.createElement("div");
    div.className = "dex-entry "+rarityMap[p];

    if(player.pokedex[p]){
      div.classList.add("collected");
      div.textContent = `${String(index+1).padStart(3,"0")} — ${p}`;
      // Shiny
      if(player.pokedex[p].shiny>0){
        const star = document.createElement("span");
        star.textContent=" ★";
        star.style.color="red";
        div.appendChild(star);
      } else {
        div.textContent += " ☆";
      }
    } else {
      div.textContent = `${String(index+1).padStart(3,"0")} — ????`;
    }

    pokedexDropdown.appendChild(div);
  });
}

// Update UI
function updateUI(){
  document.getElementById("playerInfo").textContent = "Trainer: "+player.username;
  document.getElementById("rolls").textContent = player.totalRolls;
  document.getElementById("best").textContent = player.bestPull||"None";
  renderDex(dexSearch.value);
}

// Roll
function rollRarity(){
  let r=Math.random()*100, sum=0;
  for(const x of rarityTable){ sum+=x.chance; if(r<=sum) return x; }
  return rarityTable[0];
}

rollBtn.onclick=()=>{
  const r=rollRarity();
  const p=r.pool[Math.floor(Math.random()*r.pool.length)];
  const isShiny = Math.random() < 0.01; // 1% shiny chance

  player.totalRolls++;
  if(!player.pokedex[p]) player.pokedex[p]={normal:0,shiny:0};
  if(isShiny) player.pokedex[p].shiny++; else player.pokedex[p].normal++;

  if(r.rank>player.bestRank){
    player.bestRank=r.rank;
    player.bestPull = p + (isShiny?" (Shiny)":"") + " ("+r.name+")";
  }

  const card = document.getElementById("result");
  card.className = "card "+r.class;
  card.style.animation="POP 0.5s ease";
  card.innerHTML=`<div>${p}${isShiny?" ☆":""}</div><small>${r.name}${isShiny?" ★":""}</small>`;

  save(); updateUI();
};

// Start
startBtn.onclick=()=>{
  const name = document.getElementById("usernameInput").value.trim();
  if(!name) return alert("Enter a name");
  player={username:name,totalRolls:0,bestRank:0,bestPull:null,pokedex:{}};
  login.style.display="none"; game.style.display="block"; save(); updateUI();
};

// Search
dexSearch.addEventListener("input",(e)=>{ renderDex(e.target.value); });

load();

});
</script>

</body>
</html>
