  text-align: center;
  padding: 30px;
}

button, input {
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: #ff4757;
  color: white;
  cursor: pointer;
}

.card {
  margin: 20px auto;
  width: 250px;
  height: 160px;
  border-radius: 15px;
  background: #14183a;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 20px;
}

.common { color:#aaa; }
.uncommon { color:#2ecc71; }
.rare { color:#3498db; }
.ultra { color:#9b59b6; }
.mythical { color:gold; }
.spoiler { color:teal; }

.dex-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(100px,1fr));
  gap:8px;
  max-width:700px;
  margin:auto;
}

.dex-entry {
  background:#0f1233;
  padding:6px;
  border-radius:8px;
  opacity:0.35;
}

.dex-entry.collected {
  opacity:1;
}
</style>

const fullDex = rarityTable.flatMap(r => r.pool);

let player = {
  username:"",
  totalRolls:0,
  bestRank:0,
  bestPull:null,
  pokedex:{}
};

const login = document.getElementById("login");
const game = document.getElementById("game");
const rollBtn = document.getElementById("rollBtn");
const startBtn = document.getElementById("startBtn");

function save() {
  localStorage.setItem("pokemonRNG", JSON.stringify(player));
}

function load() {
  const data = localStorage.getItem("pokemonRNG");
  if (!data) return;
  player = JSON.parse(data);
  login.style.display="none";
  game.style.display="block";
  updateUI();
}

function updateUI() {
  document.getElementById("playerInfo").textContent = "Trainer: " + player.username;
  document.getElementById("rolls").textContent = player.totalRolls;
  document.getElementById("best").textContent = player.bestPull || "None";
  renderDex();
}

function renderDex() {
  const dex = document.getElementById("pokedex");
  dex.innerHTML="";
  fullDex.forEach(p => {
    const div = document.createElement("div");
    div.className = "dex-entry" + (player.pokedex[p] ? " collected" : "");
    div.textContent = player.pokedex[p] ? p : "?????";
    dex.appendChild(div);
  });
}

function rollRarity() {
  let r = Math.random()*100, sum=0;
  for (const x of rarityTable) {
    sum+=x.chance;
    if (r<=sum) return x;
  }
}

rollBtn.onclick = () => {
  const r = rollRarity();
  const p = r.pool[Math.floor(Math.random()*r.pool.length)];
  player.totalRolls++;
  player.pokedex[p] = (player.pokedex[p]||0)+1;
  if (r.rank > player.bestRank) {
    player.bestRank = r.rank;
    player.bestPull = p + " (" + r.name + ")";
  }
  const card = document.getElementById("result");
  card.className = "card " + r.class;
  card.innerHTML = `<div>${p}</div><small>${r.name}</small>`;
  save();
  updateUI();
};

startBtn.onclick = () => {
  const name = document.getElementById("usernameInput").value.trim();
  if (!name) return alert("Enter a name");
  player = {username:name,totalRolls:0,bestRank:0,bestPull:null,pokedex:{}};
  login.style.display="none";
  game.style.display="block";
  save();
  updateUI();
};
