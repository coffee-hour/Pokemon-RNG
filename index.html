<script>
document.addEventListener("DOMContentLoaded", () => {

/* ---------------- MEGA CONFIG ---------------- */

const megaPokemon = new Set([
  "Venusaur","Charizard","Blastoise",
  "Beedrill","Pidgeot","Alakazam","Slowbro",
  "Gengar","Kangaskhan","Pinsir","Gyarados",
  "Aerodactyl","Mewtwo",
  "Ampharos","Scizor","Heracross","Houndoom",
  "Tyranitar"
]);

const SHINY_CHANCE = 0.001;   // 0.1%
const MEGA_CHANCE  = 0.005;   // 0.5%

/* ---------------- EXISTING DATA ---------------- */

const rarityTable = [ /* unchanged – keep yours */ ];
const genAllOrder  = [ /* unchanged – keep yours */ ];

const rarityMap = {};
rarityTable.forEach(t => t.pool.forEach(p => rarityMap[p] = t.class));

/* ---------------- STATE ---------------- */

let player = {
  username:"",
  totalRolls:0,
  bestRank:0,
  bestPull:null,
  pokedex:{} // { normal, shiny, mega, megaShiny }
};

const login = document.getElementById("login");
const game = document.getElementById("game");
const rollBtn = document.getElementById("rollBtn");
const startBtn = document.getElementById("startBtn");
const pokedexDropdown = document.getElementById("pokedexDropdown");
const dexSearch = document.getElementById("dexSearch");

/* ---------------- SAVE / LOAD ---------------- */

function save(){
  localStorage.setItem("pokemonRNG", JSON.stringify(player));
}

function load(){
  const data = localStorage.getItem("pokemonRNG");
  if(data){
    player = JSON.parse(data);
    login.style.display="none";
    game.style.display="block";
    updateUI();
  }
}

/* ---------------- DEX RENDER ---------------- */

function renderDex(filter=""){
  pokedexDropdown.innerHTML="";

  genAllOrder.forEach((p,index)=>{
    if(filter && !p.toLowerCase().includes(filter.toLowerCase())) return;

    const div = document.createElement("div");
    div.className = "dex-entry "+rarityMap[p];

    const data = player.pokedex[p];
    const canMega = megaPokemon.has(p);

    if(data){
      div.classList.add("collected");
      div.textContent = `${String(index+1).padStart(3,"0")} — ${p}`;

      if(canMega){
        if(data.megaShiny > 0){
          div.innerHTML += ` <span style="color:red">⛂★</span>`;
        } else if(data.mega > 0){
          div.innerHTML += ` <span style="color:red">⛂</span>`;
        } else {
          div.innerHTML += ` ⛀`;
        }
      }

      if(data.shiny > 0) div.innerHTML += ` ★`;
      else div.innerHTML += ` ☆`;
    } else {
      div.textContent = `${String(index+1).padStart(3,"0")} — ????`;
    }

    pokedexDropdown.appendChild(div);
  });
}

/* ---------------- UI ---------------- */

function updateUI(){
  document.getElementById("playerInfo").textContent = "Trainer: "+player.username;
  document.getElementById("rolls").textContent = player.totalRolls;
  document.getElementById("best").textContent = player.bestPull || "None";
  renderDex(dexSearch.value);
}

/* ---------------- ROLL LOGIC ---------------- */

function rollRarity(){
  let r=Math.random()*100, sum=0;
  for(const x of rarityTable){
    sum+=x.chance;
    if(r<=sum) return x;
  }
  return rarityTable[0];
}

rollBtn.onclick = () => {
  const tier = rollRarity();
  const p = tier.pool[Math.floor(Math.random()*tier.pool.length)];

  const canMega = megaPokemon.has(p);
  const isMega  = canMega && Math.random() < MEGA_CHANCE;
  const isShiny = Math.random() < SHINY_CHANCE;

  player.totalRolls++;

  if(!player.pokedex[p]){
    player.pokedex[p] = { normal:0, shiny:0, mega:0, megaShiny:0 };
  }

  if(isMega && isShiny) player.pokedex[p].megaShiny++;
  else if(isMega) player.pokedex[p].mega++;
  else if(isShiny) player.pokedex[p].shiny++;
  else player.pokedex[p].normal++;

  if(tier.rank > player.bestRank){
    player.bestRank = tier.rank;
    player.bestPull =
      p +
      (isMega ? " (Mega)" : "") +
      (isShiny ? " ★" : "") +
      " (" + tier.name + ")";
  }

  const card = document.getElementById("result");
  card.className = "card " + tier.class;
  card.style.animation="POP 0.5s ease";

  card.innerHTML = `
    <div>
      ${p}
      ${isMega ? " <span style='color:red'>⛂</span>" : ""}
      ${isShiny ? " ★" : ""}
    </div>
    <small>${tier.name}</small>
  `;

  save();
  updateUI();
};

/* ---------------- START ---------------- */

startBtn.onclick = () => {
  const name = document.getElementById("usernameInput").value.trim();
  if(!name) return alert("Enter a name");
  player={username:name,totalRolls:0,bestRank:0,bestPull:null,pokedex:{}};
  login.style.display="none";
  game.style.display="block";
  save();
  updateUI();
};

dexSearch.addEventListener("input", e => renderDex(e.target.value));

load();
});
</script>
