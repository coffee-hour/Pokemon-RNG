<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: Arial, sans-serif;
  padding: 30px;
  display: flex;
  flex-direction: row;
}

/* Main content on right */
#mainContent {
  flex: 1;
  text-align: center;
}

/* Pokédex sidebar on left */
#pokedexSidebar {
  width: 220px;
  margin-right: 20px;
  display: flex;
  flex-direction: column;
}

/* Search box */
#dexSearch {
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

/* Dropdown / scrollable Pokédex */
#pokedexDropdown {
  display: block;
  max-height: 600px;
  overflow-y: auto;
  border: 2px solid #444;
  border-radius: 10px;
  padding: 10px;
  background: #0f1233;
}

/* Dex entries */
.dex-entry {
  padding: 6px 10px;
  border-radius: 6px;
  margin: 4px;
  font-size: 14px;
  font-weight: 500;
  display: inline-block;
  opacity: 0.35;
}

.dex-entry.collected {
  opacity: 1;
}

/* Rarity colors */
.common { background:#b0bec5; color:#000; }
.uncommon { background:#66bb6a; color:#000; }
.rare { background:#42a5f5; color:#fff; }
.ultra { background:#ab47bc; color:#fff; }
.mythical { background: linear-gradient(45deg, gold, orange); color:#000; font-weight:700; }
.mega { background: linear-gradient(45deg, crimson, gold); color: #000; font-weight: 700; box-shadow: 0 0 10px gold; }


/* Buttons */
button, input { padding: 10px; margin: 6px; border-radius: 10px; border: none; font-size: 14px; }
button { background: #ff4757; color: white; cursor: pointer; }

.card {
  margin: 20px auto;
  width: 250px;
  height: 160px;
  border-radius: 15px;
  background: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 20px;
  transition: transform 0.5s ease, color 0.5s ease;
  animation: POP 0.5s ease;
}

/* Card animation */
@keyframes POP {
  0% { transform: scale(0.8); opacity: 0; }
  50% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* Rarity text colors for card */
.card.common { color: #aaa; }
.card.uncommon { color: #2ecc71; }
.card.rare { color: #3498db; }
.card.ultra { color: #9b59b6; }
.card.mythical { color: gold; }
.card.mega { color: red; text-shadow: 0 0 8px crimson; }
</style>
</head>

<body>

<div id="pokedexSidebar">
  <input id="dexSearch" placeholder="Search Pokémon...">
  <div id="pokedexDropdown" class="dex-grid"></div>
</div>

<div id="mainContent">
<h1>🎲 Pokemon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Username">
  <br>
  <button id="startBtn">Start</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>
  <button id="rollBtn">Roll Pokemon</button>
  <div id="result" class="card common">Roll to begin</div>
  <p>Rolls: <span id="rolls">0</span></p>
  <p>Best: <span id="best">None</span></p>
</div>
</div>

    "Lanturn","Togetic","Xatu","Flaaffy","Bellossom","Azumarill","Sudowoodo","Politoed",
    "Skiploom","Jumpluff","Aipom","Sunflora","Yanma","Quagsire","Espeon","Umbreon",
    "Slowking","Misdreavous","Unown","Wobbuffet","Girafarig","Forretress","Dunsparce",
    "Steelix","Granbull","Qwilfish","Scizor","Shuckle","Heracross","Sneasel","Ursaring",
    "Magcargo","Piloswine","Corsola","Octillery","Mantine","Skarmory","Houndour","Kingdra",
    "Porygon2","Stantler","Smeargle","Hitmontop","Smoochum","Elekid","Magby","Miltank"
  ]},
  { name:"Ultra", class:"ultra", chance:6, rank:4, pool:[
    "Farfetchd","Chansey","MrMime","Aerodactyl","Dratini","Dragonair","Dragonite"
    ]},
  { name:"Mythical", class:"mythical", chance:3, rank:5, pool:[
    "Articuno","Zapdos","Moltres","Mewtwo","Mew","Lugia","Ho-Oh","Celebi"
  ]},
  { name: "Mega", class:"mega", chance:1, rank:5, pool:[
    "Mega Venusaur","Mega Charizard X","Mega Charizard Y","Mega Blastoise",
    "Mega Beedrill","Mega Pidgeot","Mega Alakazam","Mega Slowbro",
    "Mega Gengar","Mega Kangaskhan","Mega Pinsir","Mega Gyarados",
    "Mega Aerodactyl","Mega Mewtwo X","Mega Mewtwo Y",
    "Mega Ampharos","Mega Scizor","Mega Heracross",
    "Mega Houndoom","Mega Tyranitar"
  ]},
  ];
// Dex number order array (Kanto+Johto)
const genAllOrder = [
  "Bulbasaur","Ivysaur","Venusaur","Charmander","Charmeleon","Charizard","Squirtle","Wartortle","Blastoise",
  "Caterpie","Metapod","Butterfree","Weedle","Kakuna","Beedrill","Pidgey","Pidgeotto","Pidgeot",
  "Rattata","Raticate","Spearow","Fearow","Ekans","Arbok","Sandshrew","Sandslash",
  "Nidoran-F","Nidorina","Nidoqueen","Nidoran-M","Nidorino","Nidoking","Clefairy","Clefable","Vulpix","Ninetales",
  "Jigglypuff","Wigglytuff","Zubat","Golbat","Oddish","Gloom","Vileplume","Paras","Parasect","Venonat","Venomoth",
  "Diglett","Dugtrio","Meowth","Persian","Psyduck","Golduck","Mankey","Primeape","Growlithe","Arcanine",
  "Poliwag","Poliwhirl","Poliwrath","Abra","Kadabra","Alakazam","Machop","Machoke","Machamp",
  "Bellsprout","Weepinbell","Victreebel","Tentacool","Tentacruel","Geodude","Graveler","Golem",
  "Ponyta","Rapidash","Slowpoke","Slowbro","Magnemite","Magneton","Farfetchd","Doduo","Dodrio",
  "Seel","Dewgong","Grimer","Muk","Shellder","Cloyster","Gastly","Haunter","Gengar","Onix",
  "Drowzee","Hypno","Krabby","Kingler","Voltorb","Electrode","Exeggcute","Exeggutor","Cubone","Marowak",
  "Hitmonlee","Hitmonchan","Lickitung","Koffing","Weezing","Rhyhorn","Rhydon","Chansey","Tangela","Kangaskhan",
  "Horsea","Seadra","Goldeen","Seaking","Staryu","Starmie","MrMime","Scyther","Jynx","Electabuzz","Magmar","Pinsir","Tauros",
  "Magikarp","Gyarados","Lapras","Ditto","Eevee","Vaporeon","Jolteon","Flareon","Porygon","Omanyte","Omastar",
  "Kabuto","Kabutops","Aerodactyl","Snorlax","Articuno","Zapdos","Moltres","Dratini","Dragonair","Dragonite","Mewtwo","Mew",

  "Sentret","Furret","Hoothoot","Noctowl","Ledyba","Ledian","Spinarak","Ariados","Crobat",
  "Chinchou","Lanturn","Pichu","Cleffa","Igglybuff","Togepi","Togetic","Natu","Xatu","Mareep","Flaaffy","Ampharos",
  "Bellossom","Marill","Azumarill","Sudowoodo","Politoed","Hoppip","Skiploom","Jumpluff","Aipom",
  "Sunkern","Sunflora","Yanma","Wooper","Quagsire","Espeon","Umbreon","Murkrow","Slowking","Misdreavous",
  "Unown","Wobbuffet","Girafarig","Pineco","Forretress","Dunsparce","Gligar","Steelix","Snubbull","Granbull",
  "Qwilfish","Scizor","Shuckle","Heracross","Sneasel","Teddiursa","Ursaring","Slugma","Magcargo","Swinub",
  "Piloswine","Corsola","Remoraid","Octillery","Delibird","Mantine","Skarmory","Houndour","Houndoom",
  "Kingdra","Phanpy","Donphan","Porygon2","Stantler","Smeargle","Tyrogue","Hitmontop","Smoochum","Elekid",
  "Magby","Miltank","Blissey","Raikou","Entei","Suicune","Larvitar","Pupitar","Tyranitar","Lugia","Ho-Oh","Celebi",
  ];
const megaMap = {
  "Mega Venusaur": "Venusaur",
  "Mega Charizard X": "Charizard",
  "Mega Charizard Y": "Charizard",
  "Mega Blastoise": "Blastoise",
  "Mega Beedrill": "Beedrill",
  "Mega Pidgeot": "Pidgeot",
  "Mega Alakazam": "Alakazam",
  "Mega Slowbro": "Slowbro",
  "Mega Gengar": "Gengar",
  "Mega Kangaskhan": "Kangaskhan",
  "Mega Pinsir": "Pinsir",
  "Mega Gyarados": "Gyarados",
  "Mega Aerodactyl": "Aerodactyl",
  "Mega Mewtwo X": "Mewtwo",
  "Mega Mewtwo Y": "Mewtwo",
  "Mega Ampharos": "Ampharos",
  "Mega Scizor": "Scizor",
  "Mega Heracross": "Heracross",
  "Mega Houndoom": "Houndoom",
  "Mega Tyranitar": "Tyranitar"
};
// Map rarity by Pokémon
const rarityMap = {};
rarityTable.forEach(tier => tier.pool.forEach(p => rarityMap[p] = tier.class));


// Player & DOM
let player = {username:"", totalRolls:0, bestRank:0, bestPull:null, pokedex:{}};
const login = document.getElementById("login");
const game = document.getElementById("game");
const rollBtn = document.getElementById("rollBtn");
const startBtn = document.getElementById("startBtn");
const pokedexDropdown = document.getElementById("pokedexDropdown");
const dexSearch = document.getElementById("dexSearch");

// Save/load
function save(){ localStorage.setItem("pokemonRNG", JSON.stringify(player)); }
function load(){ 
  const data = localStorage.getItem("pokemonRNG"); 
  if(data){ player=JSON.parse(data); login.style.display="none"; game.style.display="block"; updateUI(); }
}

// Render Dex
function renderDex(filter = ""){
  pokedexDropdown.innerHTML = "";

  genAllOrder.forEach((p, index) => {
    if(filter && !p.toLowerCase().includes(filter.toLowerCase())) return;

    const div = document.createElement("div");
    const rarityClass = rarityMap[p] || "common";
    div.className = "dex-entry " + rarityClass;

    const entry = player.pokedex[p];
    div.textContent = `${String(index+1).padStart(3,"0")} — ${p}`;

    if(entry){
      div.classList.add("collected");

      // Shiny indicator
      const shinyIcon = document.createElement("span");
      shinyIcon.textContent = entry.shiny > 0 ? " ★" : " ◇";
      shinyIcon.style.color = entry.shiny > 0 ? "gold" : "#666";
      div.appendChild(shinyIcon);

      // Mega indicator
      const hasMega = entry.mega && Object.keys(entry.mega).length > 0;
      const megaIcon = document.createElement("span");
      megaIcon.textContent = hasMega ? " ⚡" : " ◇";
      megaIcon.style.color = hasMega ? "gold" : "#666";
      div.appendChild(megaIcon);

    } else {
      // Not owned at all
      const missing = document.createElement("span");
      missing.textContent = " ◇ ◇";
      missing.style.color = "#444";
      div.appendChild(missing);
    }

    pokedexDropdown.appendChild(div);
  });
}

// Update UI
function updateUI(){
  document.getElementById("playerInfo").textContent = "Trainer: "+player.username;
  document.getElementById("rolls").textContent = player.totalRolls;
  document.getElementById("best").textContent = player.bestPull||"None";
  renderDex(dexSearch.value);
}

// Roll
function rollRarity(){
  let r=Math.random()*100, sum=0;
  for(const x of rarityTable){ sum+=x.chance; if(r<=sum) return x; }
  return rarityTable[0];
}

rollBtn.onclick=()=>{
  const r=rollRarity();
  const p=r.pool[Math.floor(Math.random()*r.pool.length)];
  const isShiny = Math.random() < 0.001;
  player.totalRolls++;
 const base = megaMap[p] || p;

if(!player.pokedex[base]){
  player.pokedex[base] = { normal:0, shiny:0, mega:{} };
}

if(megaMap[p]){
  player.pokedex[base].mega[p] = true;
} else {
  if(isShiny) player.pokedex[base].shiny++;
  else player.pokedex[base].normal++;
}

  if(r.rank>player.bestRank){ player.bestRank=r.rank; player.bestPull = p+(isShiny?" (Shiny)":"")+" ("+r.name+")"; }

  const card = document.getElementById("result");
  card.className = "card "+r.class;
  card.style.animation="POP 0.5s ease";
  card.innerHTML=`<div>${p}${isShiny?" ★":""}</div><small>${r.name}</small>`;
  save(); updateUI();
};

// Start
startBtn.onclick=()=>{
  const name=document.getElementById("usernameInput").value.trim();
  if(!name) return alert("Enter a name");
  player={username:name,totalRolls:0,bestRank:0,bestPull:null,pokedex:{}};
  login.style.display="none"; game.style.display="block"; save(); updateUI();
};

// Search
dexSearch.addEventListener("input",(e)=>{ renderDex(e.target.value); });

load();
});
</script>
</body>
</html>
