<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Supabase Username Test</title>
</head>
<body>

<h2>Lookup Player</h2>

<input id="name" placeholder="username">
<button id="btn">Fetch Player</button>

<pre id="output">Waiting...</pre>

<!-- CORRECT browser build -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
const SUPABASE_URL = "https://mlkhgrkayqwqlvzagvjq.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY_HERE";

const client = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

const btn = document.getElementById("btn");
const output = document.getElementById("output");

btn.onclick = async () => {
  output.textContent = "Querying...";

  const username = document.getElementById("name").value.trim();
  if (!username) {
    output.textContent = "No username entered";
    return;
  }

  const { data, error } = await client
    .from("players")
    .select("*")
    .eq("username", username)
    .maybeSingle();

  if (error) {
    output.textContent = "ERROR:\n" + JSON.stringify(error, null, 2);
  } else if (!data) {
    output.textContent = "No user found";
  } else {
    output.textContent = "FOUND:\n" + JSON.stringify(data, null, 2);
  }
};
</script>

</body>
</html>
