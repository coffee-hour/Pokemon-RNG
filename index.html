<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px;
}

button, input {
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: #ff4757;
  color: white;
  cursor: pointer;
}

.card {
  margin: 20px auto;
  width: 250px;
  height: 160px;
  border-radius: 15px;
  background: #14183a;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 20px;
}

.common { color:#aaa; }
.uncommon { color:#2ecc71; }
.rare { color:#3498db; }
.ultra { color:#9b59b6; }
.mythical { color:gold; }
.spoiler { color:teal; }

.dex-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(100px,1fr));
  gap:8px;
  max-width:700px;
  margin:auto;
}

.dex-entry {
  background:#0f1233;
  padding:6px;
  border-radius:8px;
  opacity:0.35;
}

.dex-entry.collected {
  opacity:1;
}
</style>
</head>

<body>

<h1>🎲 Pokemon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Username">
  <br>
  <button id="startBtn">Start</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>
  <button id="rollBtn">Roll Pokemon</button>

  <div id="result" class="card common">Roll to begin</div>

  <p>Rolls: <span id="rolls">0</span></p>
  <p>Best: <span id="best">None</span></p>

  <h3>Pokedex</h3>
  <div id="pokedex" class="dex-grid"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const rarityTable = [
  {name:"Common", class:"common", chance:70, pool:["Pidgey","Rattata","Zubat"], rank:1},
  {name:"Uncommon", class:"uncommon", chance:20, pool:["Golbat","Fearow"], rank:2},
  {name:"Rare", class:"rare", chance:8, pool:["Arcanine","Raichu"], rank:3},
  {name:"Ultra", class:"ultra", chance:1.8, pool:["Dragonite"], rank:4},
  {name:"Mythical", class:"mythical", chance:0.15, pool:["Mewtwo"], rank:5},
  {name:"Spoiler", class:"spoiler", chance:0.05, pool:["Lugia"], rank:6}
];

const fullDex = rarityTable.flatMap(r => r.pool);

let player = {
  username:"",
  totalRolls:0,
  bestRank:0,
  bestPull:null,
  pokedex:{}
};

const login = document.getElementById("login");
const game = document.getElementById("game");
const rollBtn = document.getElementById("rollBtn");
const startBtn = document.getElementById("startBtn");

function save() {
  localStorage.setItem("pokemonRNG", JSON.stringify(player));
}

function load() {
  const data = localStorage.getItem("pokemonRNG");
  if (!data) return;
  player = JSON.parse(data);
  login.style.display="none";
  game.style.display="block";
  updateUI();
}

function updateUI() {
  document.getElementById("playerInfo").textContent = "Trainer: " + player.username;
  document.getElementById("rolls").textContent = player.totalRolls;
  document.getElementById("best").textContent = player.bestPull || "None";
  renderDex();
}

function renderDex() {
  const dex = document.getElementById("pokedex");
  dex.innerHTML="";
  fullDex.forEach(p => {
    const div = document.createElement("div");
    div.className = "dex-entry" + (player.pokedex[p] ? " collected" : "");
    div.textContent = player.pokedex[p] ? p : "?????";
    dex.appendChild(div);
  });
}

function rollRarity() {
  let r = Math.random()*100, sum=0;
  for (const x of rarityTable) {
    sum+=x.chance;
    if (r<=sum) return x;
  }
}

rollBtn.onclick = () => {
  const r = rollRarity();
  const p = r.pool[Math.floor(Math.random()*r.pool.length)];
  player.totalRolls++;
  player.pokedex[p] = (player.pokedex[p]||0)+1;
  if (r.rank > player.bestRank) {
    player.bestRank = r.rank;
    player.bestPull = p + " (" + r.name + ")";
  }
  const card = document.getElementById("result");
  card.className = "card " + r.class;
  card.innerHTML = `<div>${p}</div><small>${r.name}</small>`;
  save();
  updateUI();
};

startBtn.onclick = () => {
  const name = document.getElementById("usernameInput").value.trim();
  if (!name) return alert("Enter a name");
  player = {username:name,totalRolls:0,bestRank:0,bestPull:null,pokedex:{}};
  login.style.display="none";
  game.style.display="block";
  save();
  updateUI();
};

load();

});
</script>

</body>
</html>
loadPlayer();
</script>

</body>
</html>
