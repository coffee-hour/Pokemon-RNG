<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon RNG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: radial-gradient(circle at top, #1b1f4b, #0a0c1a);
  color: #fff;
  font-family: Arial, sans-serif;
  padding: 30px;
  display: flex;
  flex-direction: row;
}

/* Main content on right */
#mainContent {
  flex: 1;
  text-align: center;
}

/* Pokédex sidebar on left */
#pokedexSidebar {
  width: 220px;
  margin-right: 20px;
  display: flex;
  flex-direction: column;
}

/* Search box */
#dexSearch {
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

/* Dropdown / scrollable Pokédex */
#pokedexDropdown {
  display: block;
  max-height: 600px;
  overflow-y: auto;
  border: 2px solid #444;
  border-radius: 10px;
  padding: 10px;
  background: #0f1233;
}

/* Dex entries */
.dex-entry {
  padding: 6px 10px;
  border-radius: 6px;
  margin: 4px;
  font-size: 14px;
  font-weight: 500;
  display: inline-block;
  opacity: 0.35;
}

.dex-entry.collected {
  opacity: 1;
}

/* Rarity colors */
.common { background:#b0bec5; color:#000; }
.uncommon { background:#66bb6a; color:#000; }
.rare { background:#42a5f5; color:#fff; }
.ultra { background:#ab47bc; color:#fff; }
.mythical { background: linear-gradient(45deg, gold, orange); color:#000; font-weight:700; }

/* Buttons */
button, input { padding: 10px; margin: 6px; border-radius: 10px; border: none; font-size: 14px; }
button { background: #ff4757; color: white; cursor: pointer; }

.card {
  margin: 20px auto;
  width: 250px;
  height: 160px;
  border-radius: 15px;
  background: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 20px;
  transition: transform 0.5s ease, color 0.5s ease;
  animation: POP 0.5s ease;
}

/* Card animation */
@keyframes POP {
  0% { transform: scale(0.8); opacity: 0; }
  50% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* Rarity text colors for card */
.card.common { color: #aaa; }
.card.uncommon { color: #2ecc71; }
.card.rare { color: #3498db; }
.card.ultra { color: #9b59b6; }
.card.mythical { color: gold; }
.card.spoiler { color: teal; }
</style>
</head>

<body>

<div id="pokedexSidebar">
  <input id="dexSearch" placeholder="Search Pokémon...">
  <div id="pokedexDropdown" class="dex-grid"></div>
</div>

<div id="mainContent">
<h1>🎲 Pokemon RNG</h1>

<div id="login">
  <input id="usernameInput" placeholder="Username">
  <br>
  <button id="startBtn">Start</button>
</div>

<div id="game" style="display:none;">
  <p id="playerInfo"></p>
  <button id="rollBtn">Roll Pokemon</button>
  <div id="result" class="card common">Roll to begin</div>
  <p>Rolls: <span id="rolls">0</span></p>
  <p>Best: <span id="best">None</span></p>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================== CONFIG ================== */

const SHINY_CHANCE = 0.001; // 0.1%
const MEGA_CHANCE  = 0.005; // 0.5%

const megaPokemon = new Set([
  "Venusaur","Charizard","Blastoise",
  "Beedrill","Pidgeot","Alakazam","Slowbro",
  "Gengar","Kangaskhan","Pinsir","Gyarados",
  "Aerodactyl","Mewtwo",
  "Ampharos","Scizor","Heracross","Houndoom",
  "Tyranitar"
]);

/* ================== DATA ================== */
/* KEEP YOUR FULL TABLES — unchanged */

const rarityTable = [ /* ← YOUR FULL RARITY TABLE HERE */ ];
const genAllOrder  = [ /* ← YOUR FULL DEX ORDER HERE */ ];

/* ================== MAPS ================== */

const rarityMap = {};
rarityTable.forEach(t => t.pool.forEach(p => rarityMap[p] = t.class));

/* ================== STATE ================== */

let player = null;

const login = document.getElementById("login");
const game = document.getElementById("game");
const rollBtn = document.getElementById("rollBtn");
const startBtn = document.getElementById("startBtn");
const pokedexDropdown = document.getElementById("pokedexDropdown");
const dexSearch = document.getElementById("dexSearch");
const result = document.getElementById("result");

/* ================== SAVE / LOAD ================== */

function save(){
  localStorage.setItem("pokemonRNG", JSON.stringify(player));
}

function load(){
  const data = localStorage.getItem("pokemonRNG");
  if(data){
    player = JSON.parse(data);
    login.style.display = "none";
    game.style.display = "block";
    updateUI();
  }
}

/* ================== DEX ================== */

function renderDex(filter=""){
  pokedexDropdown.innerHTML = "";

  genAllOrder.forEach((p, index) => {
    if(filter && !p.toLowerCase().includes(filter.toLowerCase())) return;

    const div = document.createElement("div");
    div.className = "dex-entry " + (rarityMap[p] || "common");

    const data = player?.pokedex[p];
    const canMega = megaPokemon.has(p);

    if(data){
      div.classList.add("collected");
      div.innerHTML = `${String(index+1).padStart(3,"0")} — ${p}`;

      if(canMega){
        if(data.megaShiny > 0) div.innerHTML += ` <span style="color:red">⛂★</span>`;
        else if(data.mega > 0) div.innerHTML += ` <span style="color:red">⛂</span>`;
        else div.innerHTML += ` ⛀`;
      }

      div.innerHTML += data.shiny > 0 ? " ★" : " ☆";
    } else {
      div.textContent = `${String(index+1).padStart(3,"0")} — ????`;
    }

    pokedexDropdown.appendChild(div);
  });
}

/* ================== UI ================== */

function updateUI(){
  document.getElementById("playerInfo").textContent = "Trainer: " + player.username;
  document.getElementById("rolls").textContent = player.totalRolls;
  document.getElementById("best").textContent = player.bestPull || "None";
  renderDex(dexSearch.value);
}

/* ================== RNG ================== */

function rollRarity(){
  let r = Math.random() * 100, sum = 0;
  for(const tier of rarityTable){
    sum += tier.chance;
    if(r <= sum) return tier;
  }
  return rarityTable[0];
}

rollBtn.onclick = () => {
  const tier = rollRarity();
  const p = tier.pool[Math.floor(Math.random() * tier.pool.length)];

  const isShiny = Math.random() < SHINY_CHANCE;
  const isMega  = megaPokemon.has(p) && Math.random() < MEGA_CHANCE;

  player.totalRolls++;

  if(!player.pokedex[p]){
    player.pokedex[p] = { normal:0, shiny:0, mega:0, megaShiny:0 };
  }

  if(isMega && isShiny) player.pokedex[p].megaShiny++;
  else if(isMega) player.pokedex[p].mega++;
  else if(isShiny) player.pokedex[p].shiny++;
  else player.pokedex[p].normal++;

  if(tier.rank > player.bestRank){
    player.bestRank = tier.rank;
    player.bestPull =
      p +
      (isMega ? " (Mega)" : "") +
      (isShiny ? " ★" : "") +
      " (" + tier.name + ")";
  }

  result.className = "card " + tier.class;
  result.style.animation = "POP 0.5s ease";
  result.innerHTML = `
    <div>
      ${p}
      ${isMega ? " <span style='color:red'>⛂</span>" : ""}
      ${isShiny ? " ★" : ""}
    </div>
    <small>${tier.name}</small>
  `;

  save();
  updateUI();
};

/* ================== START ================== */

startBtn.onclick = () => {
  const name = document.getElementById("usernameInput").value.trim();
  if(!name) return alert("Enter a name");

  player = {
    username: name,
    totalRolls: 0,
    bestRank: 0,
    bestPull: null,
    pokedex: {}
  };

  login.style.display = "none";
  game.style.display = "block";
  save();
  updateUI();
};

dexSearch.addEventListener("input", e => renderDex(e.target.value));

load();
});
</script>
</body>
</html>
